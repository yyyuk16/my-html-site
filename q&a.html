<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>結核クイズ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <style>
    :root {
      --color-pink-light: #FFE4E1;
      --color-pink-medium: #FFB6C1;
      --color-pink-dark: #FF69B4;
      --color-pink-accent: #FFC0CB;
      --primary-color: var(--color-pink-medium);
      --secondary-color: var(--color-pink-dark);
      --accent-color: var(--color-pink-accent);
      --background-color: var(--color-pink-light);
      --text-color: #1A1A1A;
      --shadow-color: rgba(0,0,0,0.08);
      --card-bg: rgba(255, 255, 255, 0.95);
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, var(--color-pink-light), var(--color-pink-accent));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-color);
      line-height: 1.6;
    }

    .container {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 4px 6px var(--shadow-color);
      width: 90%;
      max-width: 500px;
      margin: 2rem auto;
    }

    .quiz-container {
      margin: 20px 0;
    }

    .question {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice-btn {
      padding: 10px;
      border: 2px solid var(--color-pink-medium);
      border-radius: 5px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
    }

    .choice-btn:hover {
      background: var(--color-pink-light);
    }

    .choice-btn.correct {
      background: #90EE90;
      border-color: #32CD32;
    }

    .choice-btn.incorrect {
      background: #FFB6C1;
      border-color: #FF69B4;
    }

    .result {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 5px;
      display: none;
    }

    .result.correct {
      background: #90EE90;
      color: #006400;
    }

    .result.incorrect {
      background: #FFB6C1;
      color: #8B0000;
    }

    .next-btn {
      display: none;
      margin-top: 1rem;
      padding: 10px 20px;
      background: var(--color-pink-medium);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .next-btn:hover {
      background: var(--color-pink-dark);
    }

    .category-selector {
      margin-bottom: 2rem;
      text-align: center;
    }

    .category-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .category-button {
      padding: 0.8rem 1.5rem;
      border: 2px solid var(--color-pink-medium);
      border-radius: 25px;
      background: white;
      color: var(--color-pink-dark);
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .category-button:hover {
      background: var(--color-pink-light);
      transform: translateY(-2px);
    }

    .category-button.active {
      background: var(--color-pink-medium);
      color: white;
    }

    .category-description {
      margin-top: 0.5rem;
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>結核クイズ</h1>

    <div class="category-selector">
      <h2>カテゴリーを選択</h2>
      <div class="category-buttons">
        <button class="category-button active" onclick="selectCategory('about')">
          結核とは
        </button>
        <button class="category-button" onclick="selectCategory('test')">
          検査方法
        </button>
        <button class="category-button" onclick="selectCategory('treatment')">
          治療方法
        </button>
        <button class="category-button" onclick="selectCategory('target')">
          感染対象
        </button>
        <button class="category-button" onclick="selectCategory('if')">
          結核になったら
        </button>
      </div>
      <div class="category-description" id="category-description">
        結核とは何かについての問題です。
      </div>
    </div>
  
    <div class="quiz-container">
      <div id="question" class="question"></div>
      <div id="choices" class="choices"></div>
      <div id="result" class="result"></div>
      <button id="next-btn" class="next-btn">次の問題</button>
    </div>
    <!-- スコア表示エリア -->
    <div id="score-area" style="display:none; margin-top:2rem; text-align:center;">
      <h2>あなたのスコア</h2>
      <div id="score-value" style="font-size:2rem; font-weight:bold;"></div>
      <button id="retry-btn" class="next-btn" style="display:inline-block; margin-top:1rem;">もう一度挑戦</button>
    </div>
  </div>

  <script src="q&a.js"></script>
</body>
</html>

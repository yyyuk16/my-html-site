<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医療情報管理アプリ - 医師用ダッシュボード</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        /* 既存のスタイルを維持しつつ、医師向けの色調に変更 */
        :root {
            --color-blue-light: #E3F2FD;
            --color-blue: #2196F3;
            --color-blue-dark: #1976D2;
            --color-blue-accent: #1565C0;
            --color-blue-gradient: #42A5F5;
            --primary-color: var(--color-blue);
            --secondary-color: var(--color-blue-dark);
            --accent-color: var(--color-blue-accent);
            --background-color: #F5F9FF;
            --text-color: #1A1A1A;
            --shadow-color: rgba(33, 150, 243, 0.15);
            --card-bg: rgba(255, 255, 255, 0.95);
            --todo-bg: var(--card-bg);
        }

        /* 既存のスタイル定義は維持 */
        body {
            background: linear-gradient(135deg, var(--color-blue-light), var(--color-blue));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

    .container {
        width: 100%;
        max-width: 1200px;
        background: var(--card-bg);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 8px 24px var(--shadow-color);
    }

    .header {
        text-align: center;
        margin-bottom: 30px;
    }

    .header h1 {
        font-size: 2.5rem;
        color: var(--primary-color);
        margin: 0;
        padding: 20px 0;
    }

    /* 医師向けの追加スタイル */
    .patient-list {
        margin-top: 20px;
    }

    .patient-item {
        padding: 15px;
        border-left: 4px solid var(--primary-color);
        background: white;
        margin-bottom: 10px;
        border-radius: 4px;
        box-shadow: 0 2px 4px var(--shadow-color);
    }

    .patient-item h3 {
        margin: 0 0 5px 0;
        color: var(--text-color);
    }

    .patient-info {
        font-size: 14px;
        color: #666;
    }

    .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
        margin-left: 8px;
    }

    .status-urgent {
        background: #FFEBEE;
        color: #D32F2F;
    }

    .status-normal {
        background: #E8F5E9;
        color: #2E7D32;
    }

    .tab-header {
        display: flex;
        justify-content: center;
        gap: 12px;
        background-color: var(--primary-color);
        border-radius: 25px;
        padding: 6px;
        box-shadow: 0 4px 12px var(--shadow-color);
        margin-bottom: 30px;
    }

    .tab-button {
        padding: 12px 25px;
        background: transparent;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 18px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.8);
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .tab-button.active {
        background: white;
        color: var(--primary-color);
        box-shadow: 0 2px 10px var(--shadow-color);
    }

    .main-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-top: 30px;
    }

    /* カレンダーのスタイル */
    .calendar {
        background: var(--background-color);
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 4px 15px var(--shadow-color);
        max-width: 600px;
        margin: 0 auto;
        min-height: 500px;
    }

    .calendar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        padding: 0 10px;
    }

    .calendar-header h2 {
        font-size: 1.5rem;
        color: var(--primary-color);
        margin: 0;
    }

    .calendar-header button {
        background: var(--color-blue-light);
        color: var(--primary-color);
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.1rem;
        transition: all 0.3s ease;
    }

    .calendar-header button:hover {
        background: var(--primary-color);
        color: white;
    }

    .calendar-weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        margin-bottom: 8px;
    }

    .calendar-weekday {
        text-align: center;
        font-weight: 600;
        padding: 10px 5px;
        color: var(--primary-color);
        font-size: 0.95rem;
        border-bottom: 2px solid var(--color-blue-light);
        background: #f5f9f5;
    }

    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-template-rows: repeat(5, 1fr);
        gap: 8px;
        padding: 0;
        min-height: 330px;
        height: 420px;
        max-height: 420px;
    }

    .calendar-day {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 5px;
        border-radius: 10px;
        min-height: 60px;
        box-sizing: border-box;
        width: 100%;
    }
    .calendar-day > span {
        font-size: 0.95rem;
        font-weight: bold;
        margin-bottom: 2px;
        margin-left: 2px;
    }
    .calendar-event {
        width: 100%;
        background: var(--color-blue-light);
        color: var(--primary-color);
        border-radius: 8px;
        font-size: 0.85rem;
        margin-top: 2px;
        margin-bottom: 2px;
        padding: 2px 6px;
        word-break: break-all;
        display: block;
        text-align: left;
        font-weight: bold;
        box-sizing: border-box;
        white-space: normal;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .calendar-event-title {
        font-size: 0.8rem;
        font-weight: bold;
        margin-right: 4px;
    }
    .calendar-event[data-color="blue"] {
        background: #42A5F5; /* 青 */
        color: #fff;
    }
    .calendar-event[data-color="red"] {
        background: #EF5350; /* 赤 */
        color: #fff;
    }
    .calendar-event[data-color="green"] {
        background: #66BB6A; /* 緑 */
        color: #fff;
    }
    .calendar-event[data-color="yellow"] {
        background: #FFEE58; /* 黄 */
        color: #333;
    }
    .calendar-event[data-color="purple"] {
        background: #388E3C;
        color: #fff;
    }
    .calendar-event[data-color="orange"] {
        background: #66BB6A;
        color: #fff;
    }
    .calendar-event .event-delete {
        margin-left: 10px;
        color: #888;
        font-size: 1rem;
        cursor: pointer;
    }
    .calendar-event .event-edit {
        margin-left: 2px;
        color: #888;
        font-size: 1rem;
        cursor: pointer;
    }
    .calendar-event .event-edit:hover {
        color: var(--color-blue-dark);
    }
    .event-detail-pop {
        position: absolute;
        z-index: 2000;
        background: #fff;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 10px 15px;
        min-width: 200px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.18);
        font-size: 0.95rem;
        color: #333;
        top: 30px;
        left: 0;
        display: none;
    }
    .event-detail-pop.active {
        display: block;
    }

    @media (max-width: 768px) {
        .main-content {
            grid-template-columns: 1fr;
        }
        
        .container {
            padding: 20px;
        }
    }

    /* モーダルのスタイル */
    .modal-bg {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.3);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    .modal-bg.active {
        display: flex;
    }
    .modal {
        background: var(--background-color);
        border-radius: 10px;
        padding: 30px 20px 20px 20px;
        min-width: 300px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.18);
        position: relative;
    }
    .modal-close {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 1.3rem;
        color: #888;
        cursor: pointer;
    }
    .modal input, .modal textarea {
        width: 100%;
        margin-bottom: 12px;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 1rem;
    }
    .modal button {
        background: var(--primary-color);
        color: #fff;
        border: none;
        padding: 8px 18px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>医療管理アプリ</h1>
        </div>
        <div class="tab-container">
            <div class="tab-header">
                <button class="tab-button active" onclick="location.href='home.html'">
                    <span class="tab-icon">🏥</span>
                    <span class="tab-text">HOME</span>
                </button>
                <button class="tab-button" onclick="location.href='list.html'">
                    <span class="tab-icon">👥</span>
                    <span class="tab-text">患者診療記録</span>
                </button>
                <button class="tab-button" onclick="location.href='chat.html'">
                    <span class="tab-icon">📅</span>
                    <span class="tab-text">チャット</span>
                </button>
                <button class="tab-button" onclick="location.href='docterprofile.html'">
                    <span class="tab-icon">👤</span>
                    <span class="tab-text">プロフィール</span>
                </button>
            </div>
        </div>
    <div style="background: #fff; border-radius: 16px; box-shadow: 0 4px 16px rgba(33,150,243,0.08); padding: 40px; min-height: 300px; margin-top: 40px;">
        <!-- ここにコンテンツを追加できます -->
    </div>

       
    </script>
    </body>
    </html>

<script type="module">
        // Firebase関連のimportは一時的にコメントアウト
        // import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        // ...
    
        // ご自身のAPIキーをここに貼り付けてください
        const GEMINI_API_KEY = "AIzaSyDMq79gWPAgCDffjZJqlJSAhygxC4G2bpE"; 
        
        // APIエンドポイントのURLのモデル名を変更
        const GEMINI_API_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";
    
        // API接続テスト用のシンプルなプロンプト
        const testPrompt = "こんにちは。";
    
        async function testGeminiApi() {
            console.log("Gemini APIへの接続をテスト中...");
    
            try {
                const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: testPrompt
                            }]
                        }]
                    })
                });
    
                if (response.ok) {
                    const data = await response.json();
                    console.log("✅ Gemini APIは正常に動作しています！");
                    console.log("応答:", data);
                } else {
                    const errorText = await response.text();
                    console.error("❌ Gemini APIエラーが発生しました。");
                    console.error(`ステータス: ${response.status}`);
                    console.error(`エラー詳細: ${errorText}`);
                }
            } catch (error) {
                console.error("❌ ネットワークまたはその他のエラーが発生しました。", error);
            }
        }
    
        // ページ読み込み時にテスト関数を実行
        window.addEventListener('DOMContentLoaded', testGeminiApi);
    </script>

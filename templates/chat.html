<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="患者診療記録">患者診療記録</title>
    <link rel="stylesheet" href="maintab.css">
    <link rel="stylesheet" href="d_footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
        }
        body {
            background: #f4f8fb;
            font-family: 'Noto Sans JP', 'Yu Gothic', 'Meiryo', sans-serif;
            color: #222;
            padding-top: 70px; /* ヘッダーのスペース */
        }
        
        /* ヘッダーの固定 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(249, 249, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(191, 199, 212, 0.15);
            box-shadow: 0 4px 24px rgba(0, 97, 164, 0.06);
        }
        
        /* フッターの固定 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            margin-top: 0;
        }

        /* ===== レイアウト全体 ===== */
        .flex-container {
            display: flex;
            gap: 28px;
            padding: 30px 24px 120px 24px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 80vh;
        }

        /* ===== サイドバー（患者リスト） ===== */
        .patient-list-panel {
            width: 300px;
            min-width: 220px;
            background: #fff;
            border: 1px solid #e3e8ef;
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.07);
            height: calc(100vh - 240px);
            padding: 20px 16px 16px 16px;
            display: flex;
            flex-direction: column;
        }

        /* モバイル版：患者リスト画面 */
        .mobile-patient-list-view {
            display: none;
        }
        .patient-list-panel h2 {
            font-size: 1.13rem;
            margin: 0 0 16px;
            color: #1976d2;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .patient-list-panel .search-box {
            position: relative;
            margin: 8px 0 14px 0;
        }
        #patientSearch {
            width: 100%;
            box-sizing: border-box;
            height: 36px;
            padding: 6px 32px 6px 10px;
            border: 1px solid #cfd8dc;
            border-radius: 10px;
            outline: none;
            font-size: 0.9em;
            background: #f1f5f9;
            transition: border-color 0.2s, background-color .2s;
        }
        #patientSearch:focus {
            border-color: #1976d2;
            background: #fff;
        }
        .patient-list-panel .search-box i {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.9em;
            pointer-events: none;
        }
        .chat-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 2px;
            margin-top: 2px;
        }
        .chat-item {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 10px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.18s;
            margin-bottom: 2px;
        }
        .chat-item:hover, .chat-item.active {
            background: #e3f2fd;
        }
        .doctor-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e0f7fa 60%, #bbdefb 100%);
            color: #1976d2;
            display: grid;
            place-items: center;
            font-weight: 700;
            font-size: 1.1em;
            box-shadow: 0 2px 8px rgba(33,150,243,0.07);
        }

        .chat-info {
            flex: 1;
        }
        .doctor-name {
            font-weight: 600;
            color: #222b45;
            font-size: 1em;
        }

        /* ===== チャットエリア ===== */
        .chat-area {
            flex: 1;
            min-width: 0;
            background: #fff;
            border: 1px solid #e3e8ef;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(33,150,243,0.07);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 240px);
            position: relative;
            overflow: hidden; /* 内側(#chatMessages)にスクロールを閉じ込める */
        }
        #chatInterface {
            display: none;
            height: 100%;
            flex-direction: column;
        }
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px 20px;
            border-bottom: 1px solid #f1f5f9;
            background: #f8fafc;
            border-radius: 16px 16px 0 0;
        }
        #chatPatientName {
            margin: 0;
            font-size: 1.18rem;
            font-weight: 700;
            color: #1976d2;
            letter-spacing: 0.01em;
        }
        #patientInfo {
            color: #607d8b;
            font-size: 0.98em;
        }

        /* ===== チャットボックスの中スクロールできるように修正 ===== */
        .chat-messages {
            flex: 1 1 0%;
            min-height: 0;
            max-height: 100%;
            padding: 18px 20px 18px 20px;
            overflow-y: auto;
            background: linear-gradient(180deg, #f8fafc 0%, #e3f2fd 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overscroll-behavior: contain; /* ページ全体にスクロールが伝播しないように */
            scroll-behavior: smooth;
        }

        .message {
            max-width: 70%;
            margin: 10px 6px;
            display: flex;
        }
        .message.sent {
            justify-content: flex-end;
            margin-left: auto;
        }
        .message.received {
            justify-content: flex-start;
            margin-right: auto;
        }
        .message-content {
            position: relative;
            background: #fff;
            border-radius: 16px;
            padding: 8px 12px;
            box-shadow: 0 2px 8px rgba(33,150,243,0.06);
            border: 1px solid #e3e8ef;
            min-width: 60px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
        }
        .message.received .message-content {
            border-radius: 16px 16px 16px 8px;
        }
        .message.sent .message-content {
            background: #e3f2fd;
            border-color: #90caf9;
            border-radius: 16px 16px 8px 16px;
        }
        .message-content:after {
            content: "";
            position: absolute;
            bottom: 10px;
            width: 12px;
            height: 12px;
            transform: rotate(45deg);
        }
        .message.received .message-content:after {
            left: -6px;
            background: #fff;
            border-left: 1px solid #e3e8ef;
            border-bottom: 1px solid #e3e8ef;
        }
        .message.sent .message-content:after {
            right: -6px;
            background: #e3f2fd;
            border-right: 1px solid #90caf9;
            border-bottom: 1px solid #90caf9;
        }
        .message-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
            color: #222b45;
            font-size: 1.02em;
            flex: 1 1 auto;
        }
        .message-time {
            font-size: .72rem;
            color: #90a4ae;
            margin-top: 0;
            margin-left: 6px;
            text-align: right;
            flex: 0 0 auto;
        }
        .message-sender {
            font-size: .82rem;
            font-weight: 600;
            color: #1976d2;
            margin: 0;
            flex: 0 0 auto;
        }
        .message + .message.sent,
        .message + .message.received {
            margin-top: 14px;
        }

        /* ===== チャット入力 ===== */
        .chat-input-container {
            border-top: 1px solid #e3e8ef;
            background: #f8fafc;
            padding: 14px 18px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            position: sticky;
            bottom: 0;
            border-radius: 0 0 16px 16px;
        }
        #messageInput {
            flex: 1;
            height: 42px;
            border: 1px solid #cfd8dc;
            border-radius: 10px;
            padding: 10px 14px;
            outline: none;
            font-size: 1em;
            background: #fff;
            box-shadow: inset 0 1px 2px rgba(33,150,243,0.04);
            transition: border-color 0.2s;
        }
        #messageInput:focus {
            border-color: #1976d2;
        }
        .chat-input-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .send-btn {
            background: linear-gradient(90deg, #1976d2 60%, #42a5f5 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1em;
            box-shadow: 0 2px 8px rgba(33,150,243,0.10);
            transition: transform .07s, filter .15s;
        }
        .send-btn:active {
            transform: translateY(1px);
            filter: brightness(.97);
        }
        .send-btn[disabled] {
            background: #b0b8c1;
            cursor: not-allowed;
        }
        #newlineBtn {
            background: #26c6da;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 1em;
            cursor: pointer;
        }
        #clearBtn {
            background: #90a4ae;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 1em;
            cursor: pointer;
        }

        /* ===== ガイド表示 ===== */
        #chatGuide {
            color: #90a4ae;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }
        #chatGuide p {
            margin: 0;
            font-size: 1.15em;
            color: #607d8b;
        }

        /* 1. デフォルト（PC）ではモバイル用ナビを隠す */
        .mobile-nav {
            display: none;
        }

        /* ===== レスポンシブ ===== */
        @media (max-width: 1100px) {
            .flex-container {
                gap: 12px;
                padding: 30px 6px 120px 6px;
            }
            .patient-list-panel {
                width: 210px;
                min-width: 160px;
                padding: 12px 6px 8px 6px;
            }
            .chat-area {
                height: calc(100vh - 200px);
            }
        }
        @media (max-width: 900px) {
            .flex-container {
                flex-direction: column;
                gap: 18px;
                padding: 20px 2vw 120px 2vw;
            }
            .patient-list-panel {
                width: 100%;
                min-width: 0;
                height: auto;
                max-height: 40vh;
                margin-bottom: 8px;
            }
            .chat-area {
                height: calc(100vh - 200px);
                min-height: 400px;
            }
        }
        @media (max-width: 768px) {
            /* PC用ナビを隠す */
            .tab-menu {
                display: none;
            }

            /* ヘッダーを画像のようなシンプル構成に */
            .top-bar {
                padding: 10px 15px;
                border-bottom: 1px solid #eee;
            }
            
            .header-inner {
                justify-content: space-between;
            }

            .logo span {
                font-size: 1.1rem;
            }

            /* 下部ナビゲーションを表示 */
            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 70px;
                background: #f8f9fa;
                border-top: 1px solid #eee;
                justify-content: space-around;
                align-items: center;
                z-index: 1000;
                padding-bottom: env(safe-area-inset-bottom); /* iPhoneのバー対策 */
            }

            .nav-item {
                text-decoration: none;
                color: #888;
                display: flex;
                flex-direction: column;
                align-items: center;
                font-size: 0.7rem;
                gap: 4px;
            }

            .nav-item i {
                font-size: 1.4rem;
            }

            .nav-item.active {
                color: #333; /* 選択中の色 */
            }

            /* メインコンテンツの下部に余白を追加（ナビに被らないように） */
            body {
                padding-bottom: 80px;
            }

            /* PC版のフッターをスマホでは隠す（ナビがあるため） */
            .footer {
                display: none;
            }

            /* PC版のflex-containerを非表示 */
            .flex-container {
                display: none;
            }

            /* モバイル版：患者リスト画面を表示 */
            .mobile-patient-list-view {
                display: block;
                width: 100%;
                padding: 0 2vw;
                margin-top: 20px;
            }

            .mobile-patient-list-view h2 {
                font-size: 1.1rem;
                font-weight: 600;
                margin: 0 0 15px 0;
                color: #333;
            }

            .mobile-patient-list-view .search-box {
                position: relative;
                margin-bottom: 15px;
            }

            .mobile-patient-list-view .search-box input {
                width: 100%;
                height: 40px;
                padding: 8px 35px 8px 12px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 1em;
                background: #f8f9fa;
                box-sizing: border-box;
            }

            .mobile-patient-list-view .search-box i {
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
                color: #94a3b8;
                font-size: 0.9em;
                pointer-events: none;
            }

            .mobile-patient-list-view .chat-item {
                display: flex;
                align-items: center;
                padding: 15px 0;
                border-bottom: 1px solid #eee;
                margin-bottom: 0;
                border-radius: 0;
                cursor: pointer;
            }

            .mobile-patient-list-view .chat-item:active {
                background-color: #f0f0f0;
            }

            .mobile-patient-list-view .doctor-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: linear-gradient(135deg, #2196f3, #21cbf3);
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 600;
                margin-right: 12px;
                font-size: 1.2em;
            }

            .mobile-patient-list-view .doctor-name {
                font-weight: 500;
                color: #333;
                font-size: 1em;
            }

            /* PC版の患者リストパネルを非表示 */
            .patient-list-panel {
                display: none;
            }

            /* チャットエリアを全画面表示 */
            .chat-area.mobile-chat-view {
                display: none;
                width: 100%;
                height: calc(100vh - 150px);
                border-radius: 0;
                box-shadow: none;
                border: none;
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                bottom: 80px;
                background: #fff;
                z-index: 100;
            }

            .chat-area.mobile-chat-view.active {
                display: flex;
            }

            .chat-area.mobile-chat-view .chat-messages {
                background: linear-gradient(180deg, #f8fafc 0%, #e3f2fd 100%);
            }

            /* 戻るボタンを表示 */
            .back-btn-mobile {
                display: block !important;
            }

            /* PC版のflex-containerを非表示 */
            @media (max-width: 768px) {
                .flex-container {
                    display: none;
                }
            }
        }
        @media (max-width: 600px) {
            .flex-container {
                padding: 20px 2vw 80px 2vw;
            }
            .chat-area {
                border-radius: 0;
                box-shadow: none;
                height: calc(100vh - 180px);
                min-height: 350px;
            }
            .patient-list-panel {
                border-radius: 0;
                box-shadow: none;
                max-height: 35vh;
            }
            .chat-header, .chat-messages, .chat-input-container {
                padding-left: 6px;
                padding-right: 6px;
            }
        }

        /* ===== Restorative Ledger overrides ===== */
        .patient-list-panel {
            background: #f9f9ff;
            border: none;
            box-shadow: 0 4px 24px rgba(0, 97, 164, 0.06);
        }

        .chat-area {
            background: #f9f9ff;
            border: none;
            box-shadow: 0 4px 24px rgba(0, 97, 164, 0.06);
        }

        .chat-header {
            border-bottom: 1px solid rgba(191, 199, 212, 0.15);
            background: rgba(249, 249, 255, 0.88);
            backdrop-filter: blur(8px);
        }

        .chat-item:hover, .chat-item.active {
            background: #dce2f3;
        }

        .doctor-avatar {
            background: linear-gradient(135deg, #0061a4, #2196f3);
            color: #fff;
        }

        .chat-messages {
            background: #f0f3ff;
        }

        .message.received .message-content {
            background: #dce2f3;
            color: #151c27;
        }

        .message.sent .message-content {
            background: linear-gradient(135deg, #0061a4, #2196f3);
            color: #fff;
        }

        .chat-input-container {
            background: rgba(249, 249, 255, 0.9);
            border-top: 1px solid rgba(191, 199, 212, 0.15);
        }

        #messageInput, #messageInputMobile {
            border: none;
            background: #f0f3ff;
            border-radius: 9999px;
            padding: 10px 14px;
        }

        .send-btn {
            background: linear-gradient(135deg, #0061a4, #2196f3);
            border: none;
            border-radius: 9999px;
            color: #fff;
            box-shadow: 0 4px 24px rgba(0, 97, 164, 0.2);
        }
    </style>
</head>
<body>
    <!-- 💚 ヘッダー -->
    <header class="top-bar">
        <div class="header-inner">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="back-btn-mobile" id="backBtnMobile" style="display: none; background: none; border: none; font-size: 1.5rem; color: #2196f3; cursor: pointer; padding: 5px;">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="logo" style="font-size:2rem; font-weight:700; color:#2196f3;">
                    <span data-translate="site_title">結核治療アプリ</span>
                </div>
            </div>
            <nav>
                <ul class="tab-menu">
                    <li><a href="list.html"><i class="fa-solid fa-clipboard-list"></i> <span data-translate="患者診療記録">患者診療記録</span></a></li>
                    <li><a href="chat.html" class="active"><i class="fa-solid fa-comments"></i> <span data-translate="チャット">チャット</span></a></li>
                    <li><a href="docterprofile.html"><i class="fa-solid fa-user-md"></i> <span data-translate="プロフィール">プロフィール</span></a></li>
                </ul>
            </nav>
            <div class="rl-header-actions">
                <a href="help.html" class="rl-icon-btn" title="ヘルプ・操作ガイド" aria-label="ヘルプ・操作ガイド">
                    <i class="fas fa-circle-question"></i>
                </a>
                <div class="rl-profile-pill">
                    <span class="rl-avatar" id="headerStaffAvatar">?</span>
                    <span class="rl-meta" id="headerStaffName"></span>
                </div>
            </div>
        </div>
    </header>
    <section class="rl-subheader" style="margin-top: 88px;">
        <div class="rl-kpi-card">
            <span class="rl-kpi-label">担当患者数</span>
            <span class="rl-kpi-value" id="kpiAssignedPatients">0名</span>
        </div>
        <div class="rl-kpi-card">
            <span class="rl-kpi-label">要注意患者</span>
            <span class="rl-kpi-value">-</span>
        </div>
        <div class="rl-kpi-card">
            <span class="rl-kpi-label">最終同期</span>
            <span class="rl-kpi-value" id="kpiLastSync">--:--</span>
        </div>
    </section>

    <!-- PC版：横並びレイアウト -->
    <div class="flex-container" style="margin-top:18px;">
        <!-- サイドバー：患者リスト -->
        <aside class="patient-list-panel">
            <h2><i class="fas fa-user-injured"></i> 担当患者一覧</h2>
            <div class="search-box">
                <input type="text" id="patientSearch" placeholder="患者を検索...">
                <i class="fas fa-search"></i>
            </div>
            <div class="chat-list" id="chatList"></div>
        </aside>

        <!-- メイン：チャットエリア -->
        <main class="chat-area" id="chatArea">
            <!-- 案内 -->
            <div id="chatGuide" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;">
                <i class="fas fa-comment-dots" style="font-size:3em;color:#2196F3;margin-bottom:18px;"></i>
                <p style="font-size:1.15em;color:#555;text-align:center;">
                    左の患者リストから<br>チャットしたい患者を選択してください。
                </p>
            </div>

            <!-- チャット画面 -->
            <div id="chatInterface" style="display:none;height:100%;flex-direction:column;">
                <div class="chat-header">
                    <h3 id="chatPatientName">患者名</h3>
                    <div class="patient-info" id="patientInfo"></div>
                </div>

                <!-- チャットボックスの中をスクロールできるようにするため、flex:1, min-height:0, max-height:100%を適用 -->
                <div class="chat-messages" id="chatMessages"></div>

                <!-- AIクイズ結果 -->
                <div class="quiz-results-section" id="quizResultsSection" style="display:none;">
                    <h4><i class="fas fa-brain"></i> AIクイズ結果</h4>
                    <div id="quizResults" class="quiz-results"></div>
                </div>

                <!-- 入力 -->
                <div class="chat-input-container">
                    <input id="messageInput" type="text" placeholder="メッセージを入力..." />
                    <button id="sendBtn" class="send-btn">
                        <i class="fas fa-paper-plane"></i> 送信
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- モバイル版：患者リスト画面 -->
    <div class="mobile-patient-list-view">
        <h2>患者リスト</h2>
        <div class="search-box">
            <input type="text" id="patientSearchMobile" placeholder="検索">
            <i class="fas fa-search"></i>
        </div>
        <div class="chat-list" id="chatListMobile"></div>
    </div>

    <!-- モバイル版：チャット画面 -->
    <main class="chat-area mobile-chat-view" id="chatAreaMobile" style="display:none;">
        <div id="chatInterfaceMobile" style="display:flex;height:100%;flex-direction:column;">
            <div class="chat-header">
                <h3 id="chatPatientNameMobile">患者名</h3>
                <div class="patient-info" id="patientInfoMobile"></div>
            </div>

            <div class="chat-messages" id="chatMessagesMobile"></div>

            <div class="chat-input-container">
                <input id="messageInputMobile" type="text" placeholder="メッセージを入力..." />
                <button id="sendBtnMobile" class="send-btn">
                    送信
                </button>
            </div>
        </div>
    </main>

    <!-- モバイル用ナビゲーション -->
    <nav class="mobile-nav">
        <a href="list.html" class="nav-item">
            <i class="fa-solid fa-clipboard-list"></i>
            <span data-translate="患者診療記録">患者診療記録</span>
        </a>
        <a href="chat.html" class="nav-item active">
            <i class="fa-solid fa-comments"></i>
            <span data-translate="チャット">チャット</span>
        </a>
        <a href="docterprofile.html" class="nav-item">
            <i class="fa-solid fa-user-md"></i>
            <span data-translate="プロフィール">プロフィール</span>
        </a>
    </nav>

    <!-- フッター -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="#" data-translate="terms">利用規約</a>
                    <a href="#" data-translate="privacy">プライバシーポリシー</a>
                </div>
                <div class="footer-copyright">
                    <small>&copy; <span data-translate="copyright_name">スマート医療ポータル</span></small>
                </div>
            </div>
        </div>
    </footer>

    <!-- Firebase SDK (v9 compat のみ使用) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <!-- 多言語対応 -->
    <script src="multilang.js"></script>
    <script src="header-staff.js"></script>

    <script>
        // ================= Firebase 初期化 =================
        const firebaseConfig = {
            apiKey: "AIzaSyB7TuGhOKbB4w7DDYt7KTejy-TrcxVZmpU",
            authDomain: "web01-2484d.firebaseapp.com",
            projectId: "web01-2484d",
            storageBucket: "web01-2484d.appspot.com",
            messagingSenderId: "90159472898",
            appId: "1:90159472898:web:261ec71f9919611011e21b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userLanguage = 'ja';

        // 翻訳ヘルパー関数（multilang.jsが読み込まれる前でも動作するように）
        function t(key, fallback) {
            try {
                if (window.multiLang && window.multiLang.translations) {
                    const lang = window.multiLang.currentLanguage || 'ja';
                    const dict = window.multiLang.translations[lang] || {};
                    return dict[key] || fallback;
                }
            } catch (e) {
                console.warn('Translation error:', e);
            }
            return fallback;
        }
        window.t = t;

        const chatListDiv = document.getElementById('chatList');
        const chatListMobileDiv = document.getElementById('chatListMobile');
        let currentPatientId = null;
        let currentPatientName = null;

        // モバイル判定
        function isMobile() {
            return window.innerWidth <= 768;
        }

        // 患者リストを表示する関数
        function renderPatientList(patients) {
            // PC版のリスト
            if (chatListDiv) {
                chatListDiv.innerHTML = '';
                if (patients.length === 0) {
                    chatListDiv.innerHTML = '<p style="color:#888;text-align:center;">担当患者がいません</p>';
                    return;
                }
                patients.forEach(patient => {
                    const chatItem = document.createElement('div');
                    chatItem.className = 'chat-item';
                    chatItem.innerHTML = `
                        <div class="doctor-avatar">${patient.name ? patient.name[0] : '?'}</div>
                        <div class="chat-info">
                            <div class="doctor-name">${patient.name || '名無し'}</div>
                        </div>`;
                    chatItem.onclick = () => openChat(patient.id, patient.name);
                    chatListDiv.appendChild(chatItem);
                });
            }

            // モバイル版のリスト
            if (chatListMobileDiv) {
                chatListMobileDiv.innerHTML = '';
                if (patients.length === 0) {
                    chatListMobileDiv.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">担当患者がいません</p>';
                    return;
                }
                patients.forEach(patient => {
                    const chatItem = document.createElement('div');
                    chatItem.className = 'chat-item';
                    const patientName = patient.name || t('unnamed', '名無し');
                    const suffix = t('honorific_suffix', 'さん');
                    chatItem.innerHTML = `
                        <div class="doctor-avatar">${patient.name ? patient.name[0] : '?'}</div>
                        <div class="chat-info">
                            <div class="doctor-name">${patientName}${suffix}</div>
                        </div>`;
                    // タップイベントを確実に設定
                    chatItem.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        openChatMobile(patient.id, patient.name);
                    });
                    chatItem.style.cursor = 'pointer';
                    chatListMobileDiv.appendChild(chatItem);
                });
            }
        }

        // ================= ユーザーログインチェック =================
        firebase.auth().onAuthStateChanged(async (user) => {
            if (!user) {
                alert('ログインしてください');
                window.location.href = 'login.html';
                return;
            }

            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'staff') {
                alert('医療者以外はアクセスできません');
                window.location.href = 'patient_home.html';
                return;
            }
            try {
                await updateHeaderStaffDisplay(user, db, userDoc.data());
            } catch (e) {}
            // 医師側は常に日本語へ翻訳
            userLanguage = 'ja';

            // 担当患者取得（assignedDoctor と assignedDoctorUid の両方をチェック）
            console.log('担当患者を取得中... 医師UID:', user.uid);
            
            const patientMap = new Map();
            
            // assignedDoctor でクエリ
            try {
                const patientsSnapshot1 = await db.collection('users')
                    .where('role', '==', 'patient')
                    .where('assignedDoctor', '==', user.uid)
                    .get();
                
                patientsSnapshot1.forEach(doc => {
                    const data = doc.data();
                    if (data.assignedDoctor === user.uid || data.assignedDoctorUid === user.uid) {
                        patientMap.set(doc.id, { id: doc.id, ...data });
                    }
                });
                console.log('assignedDoctor クエリで取得:', patientsSnapshot1.size, '件');
            } catch (e) {
                console.warn('assignedDoctor クエリエラー:', e);
            }
            
            // assignedDoctorUid でクエリ（別フィールドの場合に対応）
            try {
                const patientsSnapshot2 = await db.collection('users')
                    .where('role', '==', 'patient')
                    .where('assignedDoctorUid', '==', user.uid)
                    .get();
                
                patientsSnapshot2.forEach(doc => {
                    const data = doc.data();
                    if (data.assignedDoctor === user.uid || data.assignedDoctorUid === user.uid) {
                        patientMap.set(doc.id, { id: doc.id, ...data });
                    }
                });
                console.log('assignedDoctorUid クエリで取得:', patientsSnapshot2.size, '件');
            } catch (e) {
                console.warn('assignedDoctorUid クエリエラー（インデックス未作成の可能性）:', e);
                // インデックスが未作成の場合、全患者を取得してクライアント側でフィルタリング
                try {
                    console.log('フォールバック: 全患者を取得してフィルタリング...');
                    const allPatientsSnapshot = await db.collection('users')
                        .where('role', '==', 'patient')
                        .get();
                    
                    allPatientsSnapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.assignedDoctor === user.uid || data.assignedDoctorUid === user.uid) {
                            patientMap.set(doc.id, { id: doc.id, ...data });
                        }
                    });
                    console.log('フォールバックで追加:', allPatientsSnapshot.size, '件中', patientMap.size, '件が該当');
                } catch (fallbackError) {
                    console.error('フォールバッククエリも失敗:', fallbackError);
                }
            }
            
            const patients = Array.from(patientMap.values());
            console.log('最終的な患者数:', patients.length);
            const assignedPatientsKpi = document.getElementById('kpiAssignedPatients');
            if (assignedPatientsKpi) {
                assignedPatientsKpi.textContent = `${patients.length}名`;
            }
            if (patients.length > 0) {
                console.log('患者リスト:', patients.map(p => ({ 
                    id: p.id, 
                    name: p.name, 
                    assignedDoctor: p.assignedDoctor, 
                    assignedDoctorUid: p.assignedDoctorUid 
                })));
            } else {
                console.warn('⚠️ 担当患者が見つかりませんでした。患者データの assignedDoctor または assignedDoctorUid フィールドを確認してください。');
            }

            renderPatientList(patients);
            const lastSyncKpi = document.getElementById('kpiLastSync');
            if (lastSyncKpi) {
                lastSyncKpi.textContent = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            }

            // 検索機能（PC版）
            const patientSearch = document.getElementById('patientSearch');
            if (patientSearch) {
                patientSearch.addEventListener('input', (e) => {
                    const searchText = e.target.value.toLowerCase();
                    const items = chatListDiv.querySelectorAll('.chat-item');
                    items.forEach(item => {
                        const name = item.querySelector('.doctor-name')?.textContent.toLowerCase() || '';
                        item.style.display = name.includes(searchText) ? 'flex' : 'none';
                    });
                });
            }

            // 検索機能（モバイル版）
            const patientSearchMobile = document.getElementById('patientSearchMobile');
            if (patientSearchMobile) {
                patientSearchMobile.addEventListener('input', (e) => {
                    const searchText = e.target.value.toLowerCase();
                    const items = chatListMobileDiv.querySelectorAll('.chat-item');
                    items.forEach(item => {
                        const name = item.querySelector('.doctor-name')?.textContent.toLowerCase() || '';
                        item.style.display = name.includes(searchText) ? 'flex' : 'none';
                    });
                });
            }
        });

        // ================= 患者選択（PC版） =================
        function openChat(patientId, patientName) {
            currentPatientId = patientId;
            currentPatientName = patientName;

            document.getElementById('chatGuide').style.display = 'none';
            document.getElementById('chatInterface').style.display = 'flex';

            document.getElementById('chatPatientName').textContent = patientName;
            document.getElementById('patientInfo').innerHTML =
                `<span style="color:#666;font-size:0.9em;"><i class="fas fa-user"></i> ID: ${patientId}</span>`;

            loadChatHistory(patientId, 'chatMessages');
            setupChatInput(patientId, 'messageInput', 'sendBtn');
            setupRealtimeChat(patientId, 'chatMessages');
            // スクロール位置監視（手動スクロール中は自動で最下部へ飛ばさない）
            const chatMessages = document.getElementById('chatMessages');
            if (chatMessages) {
                window.__chatUserAtBottom = true;
                chatMessages.addEventListener('scroll', () => {
                    const nearBottom = (chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight) < 24;
                    window.__chatUserAtBottom = nearBottom;
                });
            }
        }

        // ================= 患者選択（モバイル版） =================
        function openChatMobile(patientId, patientName) {
            console.log('openChatMobile called:', patientId, patientName);
            currentPatientId = patientId;
            currentPatientName = patientName;

            // 患者リストを非表示、チャット画面を表示
            const patientListView = document.querySelector('.mobile-patient-list-view');
            const chatAreaMobile = document.getElementById('chatAreaMobile');
            const backBtnMobile = document.getElementById('backBtnMobile');
            
            if (patientListView) {
                patientListView.style.display = 'none';
            }
            if (chatAreaMobile) {
                chatAreaMobile.style.display = 'flex';
                chatAreaMobile.classList.add('active');
            }
            if (backBtnMobile) {
                backBtnMobile.style.display = 'block';
            }

            const chatPatientNameMobile = document.getElementById('chatPatientNameMobile');
            const patientInfoMobile = document.getElementById('patientInfoMobile');
            
            if (chatPatientNameMobile) {
                chatPatientNameMobile.textContent = patientName || t('unnamed', '名無し');
            }
            if (patientInfoMobile) {
                patientInfoMobile.innerHTML =
                    `<span style="color:#666;font-size:0.9em;"><i class="fas fa-user"></i> ID: ${patientId}</span>`;
            }

            loadChatHistory(patientId, 'chatMessagesMobile');
            setupChatInput(patientId, 'messageInputMobile', 'sendBtnMobile');
            setupRealtimeChat(patientId, 'chatMessagesMobile');
            
            // スクロール位置監視
            const chatMessages = document.getElementById('chatMessagesMobile');
            if (chatMessages) {
                window.__chatUserAtBottomMobile = true;
                // 既存のリスナーを削除してから追加
                chatMessages.removeEventListener('scroll', handleMobileScroll);
                chatMessages.addEventListener('scroll', handleMobileScroll);
            }
        }
        
        // モバイル版スクロールハンドラ
        function handleMobileScroll() {
            const chatMessages = document.getElementById('chatMessagesMobile');
            if (chatMessages) {
                const nearBottom = (chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight) < 24;
                window.__chatUserAtBottomMobile = nearBottom;
            }
        }

        // 戻るボタンの処理
        const backBtnMobile = document.getElementById('backBtnMobile');
        if (backBtnMobile) {
            backBtnMobile.onclick = function() {
                const patientListView = document.querySelector('.mobile-patient-list-view');
                const chatAreaMobile = document.getElementById('chatAreaMobile');
                
                if (patientListView) {
                    patientListView.style.display = 'block';
                }
                if (chatAreaMobile) {
                    chatAreaMobile.style.display = 'none';
                    chatAreaMobile.classList.remove('active');
                }
                backBtnMobile.style.display = 'none';
                currentPatientId = null;
                currentPatientName = null;
                
                // リアルタイムリスナーをクリーンアップ
                const listenerKey = 'chatListener_chatMessagesMobile';
                if (window[listenerKey]) {
                    window[listenerKey]();
                    window[listenerKey] = null;
                }
            };
        }

        // ================= チャット履歴 =================
        async function loadChatHistory(patientId, messagesElementId) {
            const chatMessages = document.getElementById(messagesElementId);
            if (!chatMessages) return;
            chatMessages.innerHTML = '読み込み中...';

            const currentUser = firebase.auth().currentUser;
            if (!currentUser) return;
            
            const chatRoomId = [currentUser.uid, patientId].sort().join('_');
            const snapshot = await db.collection('chats').doc(chatRoomId).collection('messages')
                .orderBy('timestamp', 'asc').get();

            chatMessages.innerHTML = '';
            if (snapshot.empty) {
                chatMessages.innerHTML = '<p style="color:#888;text-align:center;">メッセージなし</p>';
                return;
            }
            snapshot.forEach(doc => displayMessage(doc.data(), currentUser.uid, messagesElementId, doc.id));
            // 初期表示時は最下部へ
            chatMessages.scrollTop = chatMessages.scrollHeight;
            if (messagesElementId === 'chatMessages') {
                window.__chatUserAtBottom = true;
            } else {
                window.__chatUserAtBottomMobile = true;
            }
        }

        function displayMessage(message, currentUserId, messagesElementId = 'chatMessages', messageId = null) {
            const chatMessages = document.getElementById(messagesElementId);
            if (!chatMessages) return;

            // メッセージIDで重複チェック（既に表示されている場合はスキップ）
            if (messageId) {
                const existingMsg = chatMessages.querySelector(`[data-message-id="${messageId}"]`);
                if (existingMsg) {
                    return; // 既に表示されているのでスキップ
                }
            }

            const div = document.createElement('div');
            div.className = `message ${message.senderId === currentUserId ? 'sent' : 'received'}`;
            if (messageId) {
                div.setAttribute('data-message-id', messageId);
            }
            // Firestore Timestamp 互換（toMillis or seconds 両対応）
            const ts = message.timestamp;
            const dateObj = ts?.toMillis ? new Date(ts.toMillis())
                          : (typeof ts?.seconds === 'number' ? new Date(ts.seconds * 1000)
                          : (typeof message.clientTimeMs === 'number' ? new Date(message.clientTimeMs) : null));
            const time = dateObj
                ? dateObj.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' })
                : '--:--';
            
            const messageTextDiv = document.createElement('div');
            messageTextDiv.className = 'message-text';
            messageTextDiv.textContent = escapeHTML(message.text || ''); // 初期は原文

            div.innerHTML = `<div class="message-content">
                ${messageTextDiv.outerHTML}
                <div class="message-time">${time}</div>
            </div>`;
            chatMessages.appendChild(div);

            // 受信メッセージのみ翻訳（医師側は常に日本語）
            if (message.senderId !== currentUserId) {
                const textEl = div.querySelector('.message-text');
                textEl.textContent = '...'; // 翻訳中表示
                translateTextOpenAI(message.text || '', 'ja').then(translatedText => {
                    if (textEl) textEl.textContent = translatedText || (message.text || '');
                }).catch(e => {
                    console.error("Translation failed:", e);
                    if (textEl) textEl.textContent = escapeHTML(message.text || ''); // 失敗時は原文に戻す
                });
            }

            // 近くにいる時だけ最下部へ自動スクロール
            if (messagesElementId === 'chatMessages') {
                if (window.__chatUserAtBottom !== false) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            } else {
                if (window.__chatUserAtBottomMobile !== false) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }
        }

        const TRANSLATE_ENDPOINT = (location.protocol === 'file:')
            ? 'https://my-html-site-git-main-yyyuk16s-projects.vercel.app/api/translate'
            : '/api/translate';

        async function translateTextOpenAI(text, targetLang) {
            if (!text) return '';
            
            // 日本語の場合は翻訳をスキップして原文をそのまま返す
            if (targetLang === 'ja') {
                return text;
            }
            
            try {
                const res = await fetch(TRANSLATE_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, targetLang })
                });
                if (!res.ok) return '';
                const data = await res.json();
                return (data.translated || '').trim();
            } catch (e) {
                console.error('translate error', e);
                return '';
            }
        }

        function escapeHTML(str) {
            return str ? str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : '';
        }

        // ================= 入力と送信 =================
        function setupChatInput(patientId, inputId, btnId) {
            const input = document.getElementById(inputId);
            const btn = document.getElementById(btnId);
            if (!input || !btn) return;

            btn.onclick = () => sendMessage(patientId, inputId);
            input.onkeypress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage(patientId, inputId);
                }
            };
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage(patientId, inputId);
                }
            });
        }

        async function sendMessage(patientId, inputId) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;

            const currentUser = firebase.auth().currentUser;
            if (!currentUser) return;
            
            const chatRoomId = [currentUser.uid, patientId].sort().join('_');
            const msg = {
                text,
                senderId: currentUser.uid,
                senderName: currentUser.displayName || '医師',
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                clientTimeMs: Date.now()
            };
            await db.collection('chats').doc(chatRoomId).collection('messages').add(msg);
            input.value = '';
        }


        // ================= リアルタイム =================
        function setupRealtimeChat(patientId, messagesElementId = 'chatMessages') {
            const currentUser = firebase.auth().currentUser;
            if (!currentUser) return;
            
            const chatRoomId = [currentUser.uid, patientId].sort().join('_');

            // 既存のリスナーをクリーンアップ
            const listenerKey = `chatListener_${messagesElementId}`;
            if (window[listenerKey]) window[listenerKey]();
            
            window[listenerKey] = db.collection('chats').doc(chatRoomId).collection('messages')
                .orderBy('timestamp','asc')
                .onSnapshot(snapshot => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            const msg = change.doc.data();
                            const msgId = change.doc.id;
                            // メッセージIDで重複チェック（displayMessage内で行う）
                            displayMessage(msg, currentUser.uid, messagesElementId, msgId);
                        }
                    });
                });
        }
        
        // 翻訳を適用
        document.addEventListener('DOMContentLoaded', function() {
            if (window.multiLang && typeof window.multiLang.updateUI === 'function') {
                try { window.multiLang.updateUI(); } catch (_) {}
            }
        });
    </script>

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
         <link rel="stylesheet" href="maintab.css">
     <style>
       /* 学習進捗セクション */
       .progress-section {
         margin: 40px 0;
         padding: 30px;
         background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
         border-radius: 20px;
         color: white;
         box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
       }
       
       .progress-section h2 {
         text-align: center;
         margin-bottom: 30px;
         font-size: 2em;
         font-weight: 300;
         text-shadow: 0 2px 4px rgba(0,0,0,0.3);
       }
       
       .progress-grid {
         display: grid;
         grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
         gap: 25px;
         margin-top: 30px;
       }
       
       .progress-card {
         background: rgba(255, 255, 255, 0.1);
         backdrop-filter: blur(10px);
         border-radius: 15px;
         padding: 25px;
         text-align: center;
         border: 1px solid rgba(255, 255, 255, 0.2);
         transition: all 0.3s ease;
       }
       
       .progress-card:hover {
         transform: translateY(-5px);
         background: rgba(255, 255, 255, 0.15);
         box-shadow: 0 15px 35px rgba(0,0,0,0.2);
       }
       
       .progress-icon {
         font-size: 3em;
         margin-bottom: 15px;
         display: block;
       }
       
       .progress-card h3 {
         margin: 0 0 15px 0;
         font-size: 1.1em;
         font-weight: 500;
         opacity: 0.9;
       }
       
       .progress-value {
         font-size: 2.5em;
         font-weight: bold;
         margin-bottom: 20px;
         text-shadow: 0 2px 4px rgba(0,0,0,0.3);
       }
       
       .progress-bar {
         width: 100%;
         height: 8px;
         background: rgba(255, 255, 255, 0.2);
         border-radius: 4px;
         overflow: hidden;
       }
       
       .progress-fill {
         height: 100%;
         background: linear-gradient(90deg, #4CAF50, #8BC34A);
         border-radius: 4px;
         transition: width 1s ease, background-color 0.5s ease;
         width: 0%;
       }
       
       /* スコアセクション */
       .scores-section {
         margin: 40px 0;
         padding: 30px;
         background: #f8f9fa;
         border-radius: 20px;
         box-shadow: 0 5px 20px rgba(0,0,0,0.08);
       }
       
       .scores-section h2 {
         text-align: center;
         margin-bottom: 30px;
         color: #333;
         font-size: 2em;
         font-weight: 300;
       }
       
       /* スコアカード */
       .score-card {
         background: white;
         border-radius: 15px;
         padding: 25px;
         margin-bottom: 20px;
         box-shadow: 0 5px 20px rgba(0,0,0,0.08);
         border: 1px solid #e9ecef;
         transition: all 0.3s ease;
         position: relative;
         overflow: hidden;
       }
       
       .score-card:hover {
         transform: translateY(-3px);
         box-shadow: 0 10px 30px rgba(0,0,0,0.15);
       }
       
       .score-card.best-score {
         border: 2px solid #ffd700;
         background: linear-gradient(135deg, #fff9c4 0%, #ffffff 100%);
         box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
       }
       
       .score-card-header {
         display: flex;
         justify-content: space-between;
         align-items: center;
         margin-bottom: 20px;
         padding-bottom: 15px;
         border-bottom: 2px solid #f0f0f0;
       }
       
       .score-card-date {
         display: flex;
         align-items: center;
         color: #666;
         font-size: 0.9em;
       }
       
       .date-icon {
         margin-right: 8px;
         font-size: 1.2em;
       }
       
       .score-card-rank {
         display: flex;
         gap: 10px;
       }
       
       .rank-badge {
         padding: 6px 12px;
         border-radius: 20px;
         font-size: 0.8em;
         font-weight: bold;
         text-transform: uppercase;
         letter-spacing: 0.5px;
       }
       
       .rank-s { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #b8860b; }
       .rank-a { background: linear-gradient(135deg, #c0c0c0, #e5e5e5); color: #666; }
       .rank-b { background: linear-gradient(135deg, #cd7f32, #daa520); color: #8b4513; }
       .rank-c { background: linear-gradient(135deg, #ff6b6b, #ff8e8e); color: #c41e3a; }
       .rank-d { background: linear-gradient(135deg, #6c757d, #868e96); color: #495057; }
       
       .score-card-body {
         display: grid;
         grid-template-columns: 1fr 1fr;
         gap: 25px;
         align-items: center;
       }
       
       .score-card-main {
         text-align: center;
       }
       
       .score-accuracy, .score-correct {
         margin-bottom: 20px;
       }
       
       .accuracy-label, .correct-label {
         display: block;
         font-size: 0.9em;
         color: #666;
         margin-bottom: 5px;
         text-transform: uppercase;
         letter-spacing: 0.5px;
       }
       
       .accuracy-value {
         display: block;
         font-size: 2.5em;
         font-weight: bold;
         color: #1976d2;
       }
       
       .correct-value {
         display: block;
         font-size: 1.8em;
         font-weight: bold;
         color: #4caf50;
       }
       
       .score-card-details {
         display: flex;
         flex-direction: column;
         gap: 15px;
       }
       
       .detail-item {
         display: flex;
         align-items: center;
         gap: 10px;
         padding: 10px;
         background: #f8f9fa;
         border-radius: 8px;
       }
       
       .detail-icon {
         font-size: 1.2em;
       }
       
       .detail-label {
         font-weight: 500;
         color: #666;
         min-width: 80px;
       }
       
       .detail-value {
         font-weight: 600;
         color: #333;
       }
       
       .best-score-badge {
         position: absolute;
         top: 15px;
         right: 15px;
         background: linear-gradient(135deg, #ffd700, #ffed4e);
         color: #b8860b;
         padding: 8px 15px;
         border-radius: 20px;
         font-size: 0.8em;
         font-weight: bold;
         box-shadow: 0 3px 10px rgba(255, 215, 0, 0.3);
         animation: pulse 2s infinite;
       }
       
       @keyframes pulse {
         0% { transform: scale(1); }
         50% { transform: scale(1.05); }
         100% { transform: scale(1); }
       }
       
       /* スコアがない場合のメッセージ */
       .no-scores-message {
         text-align: center;
         padding: 60px 20px;
         color: #666;
       }
       
       .no-scores-icon {
         font-size: 4em;
         margin-bottom: 20px;
         opacity: 0.5;
       }
       
       .no-scores-message h3 {
         margin: 0 0 15px 0;
         color: #333;
         font-size: 1.5em;
         font-weight: 300;
       }
       
       .no-scores-message p {
         margin: 0;
         font-size: 1.1em;
         line-height: 1.6;
       }
       
       /* レスポンシブデザイン */
       @media (max-width: 768px) {
         .progress-grid {
           grid-template-columns: 1fr;
           gap: 20px;
         }
         
         .score-card-body {
           grid-template-columns: 1fr;
           gap: 20px;
         }
         
         .score-card-header {
           flex-direction: column;
           gap: 15px;
           align-items: flex-start;
         }
         
         .progress-section, .scores-section {
           padding: 20px;
           margin: 20px 0;
         }
       }
     </style>

    <script src="translation.js"></script>
</head>

  <script>
    // Firebaseの設定
    const firebaseConfig = {
        apiKey: "AIzaSyC31W-TEE7mIBGFwrRxJAuPugjnEFfWe_k",
        authDomain: "web01-2484d.firebaseapp.com",
        projectId: "web01-2484d",
        storageBucket: "web01-2484d.appspot.com",
        messagingSenderId: "90159472898",
        appId: "1:90159472898:web:261ec71f9919611011e21b"
    };
    firebase.initializeApp(firebaseConfig);

    let movieScoreChart = null;

    // 動画クイズスコアを取得
    async function loadMovieScores(userId) {
      try {
        const db = firebase.firestore();
        const snapshot = await db.collection('movie_quiz_scores')
          .where('userId', '==', userId)
          .orderBy('timestamp', 'desc')
          .get();
        
        const scores = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          scores.push({
            ...data,
            id: doc.id,
            quizType: 'movie'
          });
        });
        
        return scores;
      } catch (e) {
        console.error("動画クイズスコアの取得に失敗:", e);
        return [];
      }
    }

    // AIクイズスコアを取得
    async function loadAIQuizScores(userId) {
      try {
        console.log("loadAIQuizScores開始 - userId:", userId);
        const db = firebase.firestore();
        
        // インデックスエラーを避けるため、orderByを一時的に削除
        console.log("ai_quiz_scoresコレクションからクエリ実行中...");
        const snapshot = await db.collection('ai_quiz_scores')
          .where('userId', '==', userId)
          .get();
        
        console.log("クエリ結果 - ドキュメント数:", snapshot.size);
        
        const scores = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          console.log("ドキュメントデータ:", doc.id, data);
          scores.push({
            ...data,
            id: doc.id,
            quizType: 'ai'
          });
        });
        
        console.log("処理前のスコア配列:", scores);
        
        // クライアント側でソート
        scores.sort((a, b) => {
          const ta = a.timestamp && typeof a.timestamp.toDate === "function" 
            ? a.timestamp.toDate() 
            : new Date(a.timestamp);
          const tb = b.timestamp && typeof b.timestamp.toDate === "function" 
            ? b.timestamp.toDate() 
            : new Date(b.timestamp);
          return tb - ta; // 降順
        });
        
        console.log("ソート後のスコア配列:", scores);
        return scores;
      } catch (e) {
        console.error("AIクイズスコアの取得に失敗:", e);
        return [];
      }
    }

    // AIクイズスコアのみを取得し、グラフとカードに反映
    async function loadAIQuizScoresOnly(userId) {
      try {
        console.log("AIクイズスコアを取得中...");
        const aiScores = await loadAIQuizScores(userId);
        console.log("取得されたAIクイズスコア:", aiScores);
        
        if (aiScores.length === 0) {
          console.log("AIクイズスコアがありません");
          updateMovieScoreChart([]);
          renderMovieScores([]);
          return;
        }
        
        console.log(`${aiScores.length}件のAIクイズスコアを処理中...`);
        updateMovieScoreChart(aiScores);
        renderMovieScores(aiScores);
        updateStatistics(aiScores);
        
      } catch (e) {
        console.error("AIクイズスコアの取得に失敗:", e);
        // エラーメッセージをユーザーに表示
        const scoresContainer = document.getElementById('scores-container');
        if (scoresContainer) {
          scoresContainer.innerHTML = `
            <div style="text-align: center; padding: 20px; color: #666;">
              <p>AIクイズの結果を読み込めませんでした。</p>
              <p>エラー: ${e.message}</p>
              <p>しばらく待ってから再読み込みしてください。</p>
            </div>
          `;
        }
        updateMovieScoreChart([]);
        renderMovieScores([]);
      }
    }

    // 正答率からランクを判定（個別クイズのランク表示用）
    function getRank(accuracy) {
      if (accuracy === null || accuracy === undefined) return { label: 'N/A', class: 'rank-d' };
      if (accuracy >= 90) return { label: 'S', class: 'rank-s' };
      if (accuracy >= 80) return { label: 'A', class: 'rank-a' };
      if (accuracy >= 60) return { label: 'B', class: 'rank-b' };
      if (accuracy >= 40) return { label: 'C', class: 'rank-c' };
      return { label: 'D', class: 'rank-d' };
    }

    // クイズ成績推移グラフ
    function updateMovieScoreChart(scores) {
      const ctx = document.getElementById('movieScoreChart').getContext('2d');
      if (movieScoreChart) movieScoreChart.destroy();
      
      if (!scores || scores.length === 0) {
        movieScoreChart = new Chart(ctx, {
          type: 'line',
          data: { 
            labels: [], 
            datasets: [
              { label: '正答率', data: [] },
              { label: '正解数', data: [] }
            ] 
          },
          options: { 
            responsive: true, 
            maintainAspectRatio: false,
            plugins: {
              title: {
                display: true,
                text: 'クイズ成績推移'
              }
            }
          }
        });
        return;
      }
      
      // 日付順にソート
      const sortedScores = scores.slice().sort((a, b) => {
        const ta = a.timestamp && typeof a.timestamp.toDate === "function" 
          ? a.timestamp.toDate() 
          : new Date(a.timestamp);
        const tb = b.timestamp && typeof b.timestamp.toDate === "function" 
          ? b.timestamp.toDate() 
          : new Date(b.timestamp);
        return ta - tb;
      });
      
      const labels = sortedScores.map(score => {
        let d = score.timestamp && typeof score.timestamp.toDate === "function"
          ? score.timestamp.toDate()
          : new Date(score.timestamp);
        return d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
      });
      
      const accuracyData = sortedScores.map(score => parseFloat(score.accuracy) || 0);
      const correctData = sortedScores.map(score => score.correct || 0);

      movieScoreChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: '正答率 (%)',
              data: accuracyData,
              borderColor: '#667eea',
              backgroundColor: 'rgba(102, 126, 234, 0.15)',
              borderWidth: 3,
              tension: 0.4,
              fill: true,
              yAxisID: 'y',
              pointBackgroundColor: '#667eea',
              pointBorderColor: '#fff',
              pointBorderWidth: 2,
              pointRadius: 6,
              pointHoverRadius: 8,
              pointHoverBorderWidth: 3
            },
            {
              label: '正解数',
              data: correctData,
              borderColor: '#f093fb',
              backgroundColor: 'rgba(240, 147, 251, 0.15)',
              borderWidth: 3,
              tension: 0.4,
              fill: false,
              yAxisID: 'y1',
              pointBackgroundColor: '#f093fb',
              pointBorderColor: '#fff',
              pointBorderWidth: 2,
              pointRadius: 6,
              pointHoverRadius: 8,
              pointHoverBorderWidth: 3
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false,
          },
          plugins: {
            title: {
              display: true,
              text: '📈 クイズ成績推移',
              font: {
                size: 20,
                weight: 'bold',
                family: "'Noto Sans JP', sans-serif"
              },
              color: '#2c3e50',
              padding: {
                top: 10,
                bottom: 20
              }
            },
            legend: {
              position: 'top',
              labels: {
                usePointStyle: true,
                padding: 20,
                font: {
                  size: 14,
                  family: "'Noto Sans JP', sans-serif"
                },
                color: '#34495e'
              }
            },
            tooltip: {
              backgroundColor: 'rgba(255, 255, 255, 0.95)',
              titleColor: '#2c3e50',
              bodyColor: '#34495e',
              borderColor: '#bdc3c7',
              borderWidth: 1,
              cornerRadius: 8,
              displayColors: true,
              callbacks: {
                label: function(context) {
                  if (context.dataset.label === '正答率 (%)') {
                    return `📊 正答率: ${context.parsed.y}%`;
                  } else {
                    return `🎯 正解数: ${context.parsed.y}問`;
                  }
                }
              }
            }
          },
          scales: {
            x: {
              title: {
                display: true,
                text: '📅 日付',
                font: {
                  size: 14,
                  weight: 'bold'
                },
                color: '#34495e'
              },
              grid: {
                color: 'rgba(189, 195, 199, 0.3)',
                lineWidth: 1
              },
              ticks: {
                color: '#7f8c8d',
                font: {
                  size: 12
                }
              }
            },
            y: {
              type: 'linear',
              display: true,
              position: 'left',
              beginAtZero: true,
              max: 100,
              title: {
                display: true,
                text: '📊 正答率 (%)',
                font: {
                  size: 14,
                  weight: 'bold'
                },
                color: '#34495e'
              },
              grid: {
                color: 'rgba(189, 195, 199, 0.3)',
                lineWidth: 1
              },
              ticks: {
                color: '#7f8c8d',
                font: {
                  size: 12
                },
                callback: function(value) {
                  return value + '%';
                }
              }
            },
            y1: {
              type: 'linear',
              display: true,
              position: 'right',
              beginAtZero: true,
              title: {
                display: true,
                text: '🎯 正解数',
                font: {
                  size: 14,
                  weight: 'bold'
                },
                color: '#34495e'
              },
              grid: {
                drawOnChartArea: false,
                color: 'rgba(189, 195, 199, 0.3)',
                lineWidth: 1
              },
              ticks: {
                color: '#7f8c8d',
                font: {
                  size: 12
                }
              }
            }
          },
          elements: {
            line: {
              borderWidth: 3
            }
          },
          animation: {
            duration: 2000,
            easing: 'easeInOutQuart'
          }
        }
      });
    }

         // 統計情報を更新
     function updateStatistics(scores) {
       console.log("updateStatistics開始 - scores:", scores);
       if (!scores || scores.length === 0) {
         console.log("統計情報更新: スコアがありません");
         return;
       }
       
       const totalQuizzes = scores.length;
       const totalCorrect = scores.reduce((sum, score) => sum + (score.correct || 0), 0);
       const totalQuestions = scores.reduce((sum, score) => sum + (score.total || 0), 0);
       const averageAccuracy = scores.reduce((sum, score) => sum + (parseFloat(score.accuracy) || 0), 0) / totalQuizzes;
       
       console.log("統計計算結果:", {
         totalQuizzes,
         totalCorrect,
         totalQuestions,
         averageAccuracy
       });
       
       // 統計カードを更新
       const statsContainer = document.querySelector('.stats-container');
       if (statsContainer) {
         const existingStats = statsContainer.querySelector('.stats-summary');
         if (existingStats) {
           existingStats.remove();
         }
         
         const statsSummary = document.createElement('div');
         statsSummary.className = 'stats-summary';
         statsSummary.innerHTML = `
           <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px 0;">
             <div style="background: #e3f2fd; border: 1px solid #2196f3; border-radius: 8px; padding: 20px; text-align: center;">
               <h3 style="margin: 0 0 10px 0; color: #1976d2;">総クイズ数</h3>
               <p style="font-size: 2em; font-weight: bold; margin: 0; color: #1976d2;">${totalQuizzes}</p>
             </div>
             <div style="background: #e8f5e8; border: 1px solid #4caf50; border-radius: 8px; padding: 20px; text-align: center;">
               <h3 style="margin: 0 0 10px 0; color: #388e3c;">総正解数</h3>
               <p style="font-size: 2em; font-weight: bold; margin: 0; color: #388e3c;">${totalCorrect}</p>
             </div>
             <div style="background: #fff3e0; border: 1px solid #ff9800; border-radius: 8px; padding: 20px; text-align: center;">
               <h3 style="margin: 0 0 10px 0; color: #f57c00;">総問題数</h3>
               <p style="font-size: 2em; font-weight: bold; margin: 0; color: #f57c00;">${totalQuestions}</p>
             </div>
             <div style="background: #fce4ec; border: 1px solid #e91e63; border-radius: 8px; padding: 20px; text-align: center;">
               <h3 style="margin: 0 0 10px 0; color: #c2185b;">平均正答率</h3>
               <p style="font-size: 2em; font-weight: bold; margin: 0; color: #c2185b;">${averageAccuracy.toFixed(1)}%</p>
             </div>
           </div>
         `;
         
         statsContainer.appendChild(statsSummary);
         console.log("統計情報カードを追加しました");
       } else {
         console.log("statsContainerが見つかりません");
       }
       
       // 学習進捗を更新
       updateLearningProgress(scores);
     }
     
     // 学習進捗を更新
     function updateLearningProgress(scores) {
       if (!scores || scores.length === 0) return;
       
       // 学習継続日数を計算
       const uniqueDates = [...new Set(scores.map(score => {
         const date = score.timestamp && typeof score.timestamp.toDate === "function" 
           ? score.timestamp.toDate() 
           : new Date(score.timestamp);
         return date.toDateString();
       }))];
       const learningDays = uniqueDates.length;
       
       // 目標達成率を計算（80%以上を目標とする）
       const highAccuracyQuizzes = scores.filter(score => (parseFloat(score.accuracy) || 0) >= 80);
       const goalAchievement = Math.round((highAccuracyQuizzes.length / scores.length) * 100);
       
       // 連続正解数を計算
       let currentStreak = 0;
       let maxStreak = 0;
       for (let i = scores.length - 1; i >= 0; i--) {
         if ((parseFloat(scores[i].accuracy) || 0) >= 60) {
           currentStreak++;
           maxStreak = Math.max(maxStreak, currentStreak);
         } else {
           currentStreak = 0;
         }
       }
       
                // レベルを計算
         let level = "初心者";
         let levelProgress = 0;
         const avgAccuracy = scores.reduce((sum, score) => sum + (parseFloat(score.accuracy) || 0), 0) / scores.length;
         if (scores.length >= 10 && avgAccuracy >= 80) {
           level = "エキスパート";
           levelProgress = 100;
         } else if (scores.length >= 5 && avgAccuracy >= 60) {
           level = "中級者";
           levelProgress = Math.min(100, (scores.length / 10) * 100);
         } else {
           level = "初心者";
           levelProgress = Math.min(100, (scores.length / 5) * 100);
         }
       
       // 進捗バーを更新
       updateProgressBar('learning-days', learningDays, 30, '日');
       updateProgressBar('goal-achievement', goalAchievement, 100, '%');
       updateProgressBar('streak', maxStreak, 20, '問');
       updateProgressBar('level', levelProgress, 100, '%');
       
       // レベル表示を更新
       document.getElementById('level').textContent = level;
     }
     
     // 進捗バーを更新
     function updateProgressBar(elementId, current, max, unit) {
       const element = document.getElementById(elementId);
       const bar = document.getElementById(elementId + '-bar');
       
       if (element && bar) {
         element.textContent = current + unit;
         const percentage = Math.min(100, (current / max) * 100);
         bar.style.width = percentage + '%';
         
         // 色を動的に変更
         if (percentage >= 80) {
           bar.style.backgroundColor = '#4CAF50';
         } else if (percentage >= 60) {
           bar.style.backgroundColor = '#FF9800';
         } else {
           bar.style.backgroundColor = '#F44336';
         }
       }
     }

         // クイズスコアカード描画
     function renderMovieScores(scores) {
       console.log("renderMovieScores開始 - scores:", scores);
       const scoresContainer = document.getElementById('scores-container');
       
       if (!scoresContainer) {
         console.error("scores-container要素が見つかりません");
         return;
       }
       
       if (!scores || scores.length === 0) {
         console.log("スコアがありません - メッセージを表示");
         scoresContainer.innerHTML = `
           <div class="no-scores-message">
             <div class="no-scores-icon">📚</div>
             <h3>まだクイズの結果がありません</h3>
             <p>新しいクイズに挑戦して、学習を始めましょう！</p>
           </div>
         `;
         return;
       }
       
       console.log(`${scores.length}件のスコアカードを描画中...`);
       scoresContainer.innerHTML = '';
       
       // ベストスコアを探す
       const bestScore = scores.reduce((best, current) =>
         (parseFloat(current.accuracy) || 0) > (parseFloat(best.accuracy) || 0) ? current : best
       );
       
       console.log("ベストスコア:", bestScore);
       
       scores.forEach((score, index) => {
         console.log(`スコアカード${index + 1}を処理中:`, score);
         
         const scoreCard = document.createElement('div');
         scoreCard.className = 'score-card';
         
         let dateObj;
         if (score.timestamp && typeof score.timestamp.toDate === 'function') {
           dateObj = score.timestamp.toDate();
         } else {
           dateObj = new Date(score.timestamp);
         }
         const formattedDate = dateObj.toLocaleString('ja-JP');
         const rank = getRank(parseFloat(score.accuracy) || 0);
         
         if (score === bestScore) {
           scoreCard.classList.add('best-score');
         }
         
         scoreCard.innerHTML = `
           <div class="score-card-header">
             <div class="score-card-date">
               <span class="date-icon">📅</span>
               ${formattedDate}
             </div>
             <div class="score-card-rank">
               <span class="rank-badge ${rank.class}">${rank.label}ランク</span>
             </div>
           </div>
           
           <div class="score-card-body">
             <div class="score-card-main">
               <div class="score-accuracy">
                 <span class="accuracy-label">正答率</span>
                 <span class="accuracy-value">${(parseFloat(score.accuracy) || 0).toFixed(1)}%</span>
               </div>
               <div class="score-correct">
                 <span class="correct-label">正解数</span>
                 <span class="correct-value">${score.correct || 0} / ${score.total || 0}</span>
               </div>
             </div>
             
             <div class="score-card-details">
               <div class="detail-item">
                 <span class="detail-icon">🎯</span>
                 <span class="detail-label">カテゴリ:</span>
                 <span class="detail-value">${score.category || '不明'}</span>
               </div>
               <div class="detail-item">
                 <span class="detail-icon">🤖</span>
                 <span class="detail-label">クイズ種別:</span>
                 <span class="detail-value">AIクイズ</span>
               </div>
             </div>
           </div>
           
           ${score === bestScore ? '<div class="best-score-badge">🏆 ベストスコア</div>' : ''}
         `;
         scoresContainer.appendChild(scoreCard);
         console.log(`スコアカード${index + 1}を追加しました`);
       });
       
       console.log("全てのスコアカードの描画が完了しました");
     }

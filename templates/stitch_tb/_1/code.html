<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chat View - The Restorative Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&amp;family=Inter:wght@400;500;600&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#6d3900",
                        "on-surface": "#151c27",
                        "outline": "#707883",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#28496b",
                        "primary-container": "#2196f3",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#db7900",
                        "surface-container-low": "#f0f3ff",
                        "on-primary-fixed-variant": "#00497d",
                        "inverse-surface": "#2a313d",
                        "on-secondary-fixed": "#001d36",
                        "surface-container-highest": "#dce2f3",
                        "on-primary-fixed": "#001d36",
                        "on-secondary-container": "#3c5c7f",
                        "surface-variant": "#dce2f3",
                        "surface-bright": "#f9f9ff",
                        "primary-fixed": "#d1e4ff",
                        "error": "#ba1a1a",
                        "on-background": "#151c27",
                        "on-surface-variant": "#404752",
                        "secondary": "#416084",
                        "secondary-fixed": "#d1e4ff",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#2e1500",
                        "inverse-primary": "#9ecaff",
                        "surface": "#f9f9ff",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d3daea",
                        "tertiary": "#904d00",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#452200",
                        "tertiary-fixed-dim": "#ffb77b",
                        "outline-variant": "#bfc7d4",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffdcc2",
                        "background": "#f9f9ff",
                        "primary": "#0061a4",
                        "secondary-container": "#b4d4fe",
                        "primary-fixed-dim": "#9ecaff",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e2e8f8",
                        "surface-tint": "#0061a4",
                        "on-primary-container": "#002c4f",
                        "surface-container": "#e7eefe",
                        "secondary-fixed-dim": "#a9c9f2",
                        "inverse-on-surface": "#ebf1ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Public Sans", "sans-serif"],
                        "body": ["Inter", "Noto Sans JP", "sans-serif"],
                        "label": ["Inter", "Noto Sans JP", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="docked full-width top-0 bg-[#F9F9FF] flex justify-between items-center w-full px-6 py-4 max-w-full sticky z-40 bg-[#F0F3FF]">
<div class="flex items-center gap-4">
<button class="text-[#0061A4] hover:bg-[#F0F3FF] transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
</div>
<div>
<h1 class="font-['Public_Sans'] font-bold text-lg tracking-tight text-[#0061A4]">佐藤 花子</h1>
<p class="font-label text-xs text-on-surface-variant">ID: 12345</p>
</div>
</div>
</div>
<button class="text-[#0061A4] hover:bg-[#F0F3FF] transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="px-4 py-6 flex flex-col gap-6 w-full max-w-3xl mx-auto">
<!-- Date Header -->
<div class="text-center text-xs font-label text-on-surface-variant my-2">
            今日
        </div>
<!-- System Message / Collapsible AI Quiz Card -->
<div class="flex justify-center w-full">
<div class="bg-surface-container-lowest shadow-[0_4px_24px_rgba(0,97,164,0.06)] rounded-xl w-full max-w-md p-4 flex flex-col gap-3">
<div class="flex justify-between items-center cursor-pointer">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary-container" data-icon="smart_toy">smart_toy</span>
<h3 class="font-headline font-bold text-sm text-on-surface">AIクイズ結果</h3>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="expand_more">expand_more</span>
</div>
<div class="bg-surface-container-low rounded-lg p-3 text-sm text-on-surface flex flex-col gap-2">
<p>佐藤さんは本日、「服薬時間」についてのクイズに回答しました。</p>
<div class="flex items-center gap-2 text-primary font-medium">
<span class="material-symbols-outlined text-primary text-base" data-icon="check_circle">check_circle</span>
                        正解率: 100%
                    </div>
</div>
</div>
</div>
<!-- Received Message -->
<div class="flex gap-3 w-full max-w-md self-start">
<div class="w-8 h-8 rounded-full bg-surface-container-highest shrink-0 mt-auto flex items-center justify-center overflow-hidden">
<img alt="Avatar" class="w-full h-full object-cover" data-alt="portrait of a senior japanese woman with short hair looking friendly" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEs91fbRPJT1EOXYNM3VTKYme0HiXEuiXVsp0LZbdMwk12TPEiRghc-k9IBHOrUjGEtc23nf8kCE24ifMNFuGYSwvz1tD6LSl_DRZHgL_UYiwGvbTbWL2iLvnH0_1k8dtfMAhMBd4PjQYOmB9QkPyKUtc-nkGD4brK8ubgUXi3gOLZiS_GB3HBB0Jtu5qcWAfIuNAbKquQ0BQYiQe8801HpNFCrQlV3rmlIgJyaeEvTp9Xo9W5RkQGB3hZGSyRCs0ibXTxv1dsP_EY"/>
</div>
<div class="flex flex-col gap-1">
<div class="bg-surface-container-low rounded-2xl rounded-bl-none p-3 text-sm text-on-surface max-w-[260px]">
                    おはようございます。今日の薬はもう飲みました。
                </div>
<span class="text-[10px] font-label text-on-surface-variant ml-1">09:00</span>
</div>
</div>
<!-- Sent Message -->
<div class="flex flex-col gap-1 self-end w-full max-w-md items-end">
<div class="bg-primary text-on-primary rounded-2xl rounded-br-none p-3 text-sm max-w-[260px]">
                佐藤さん、おはようございます。
                ご報告ありがとうございます。体調に変わりはありませんか？
            </div>
<div class="flex items-center gap-1 mr-1">
<span class="text-[10px] font-label text-on-surface-variant">09:15</span>
<span class="material-symbols-outlined text-[14px] text-primary" data-icon="done_all">done_all</span>
</div>
</div>
<!-- Translating Message (Received) -->
<div class="flex gap-3 w-full max-w-md self-start">
<div class="w-8 h-8 rounded-full bg-surface-container-highest shrink-0 mt-auto flex items-center justify-center overflow-hidden">
<img alt="Avatar" class="w-full h-full object-cover" data-alt="portrait of a senior japanese woman with short hair looking friendly" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfktbS60w_CyATqDjEyKRbVs0Z0Dtm4kkrXSuyQXXRlTYXU0uAVk8MKdEskA1qs_11VZNTF8aLz5Nfr06po5c1NTcf0TfbepN0Bot28y5MxIwJ8d6tYv1M-w3J_pBSM2OlU_CLW2K2zomf9-Y0BPiMWb6-8IestP7q7RkFgdwY4HtjS7T0f0eRywW4Dao6O2kDykAd1_Le4PxK98pT-nIMmPenwnxiR4lxYl7_2yplN7ZyYFNXV6dJHyCExpysMDDW_ur0xH5YCDzH"/>
</div>
<div class="flex flex-col gap-1">
<div class="bg-surface-container-low rounded-2xl rounded-bl-none p-3 text-sm text-on-surface max-w-[260px] flex items-center gap-2">
<span class="material-symbols-outlined text-outline-variant animate-pulse" data-icon="translate">translate</span>
<span class="text-on-surface-variant italic">翻訳中...</span>
</div>
<span class="text-[10px] font-label text-on-surface-variant ml-1">09:30</span>
</div>
</div>
</main>
<!-- Chat Input Area (Fixed above Bottom Nav) -->
<div class="fixed bottom-[80px] w-full bg-surface/90 backdrop-blur-md px-4 py-3 z-40">
<div class="flex items-center gap-2 bg-surface-container-low rounded-full px-4 py-2 border-b-2 border-surface-variant focus-within:border-primary transition-colors max-w-3xl mx-auto">
<button class="text-outline-variant hover:text-primary transition-colors p-1">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</button>
<input class="bg-transparent border-none focus:ring-0 text-sm text-on-surface w-full placeholder:text-outline-variant py-2" placeholder="メッセージを入力..." type="text"/>
<button class="bg-gradient-to-r from-primary to-primary-container text-on-primary w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-sm hover:shadow-md transition-shadow">
<span class="material-symbols-outlined" data-icon="send">send</span>
</button>
</div>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#F9F9FF]/80 backdrop-blur-xl rounded-t-3xl border-t-[0.5px] border-blue-100/10 shadow-[0_-4px_24px_rgba(0,97,164,0.06)] tonal-shift-bg block md:hidden">
<button class="flex flex-col items-center justify-center text-[#404752] px-5 py-2 hover:text-[#0061A4] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="assignment">assignment</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest">Records</span>
</button>
<button class="flex flex-col items-center justify-center bg-[#DCE2F3] text-[#0061A4] rounded-2xl px-5 py-2 scale-105 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" data-icon="chat_bubble" data-weight="fill" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest">Chat</span>
</button>
<button class="flex flex-col items-center justify-center text-[#404752] px-5 py-2 hover:text-[#0061A4] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest">Profile</span>
</button>
</nav>
</body></html>

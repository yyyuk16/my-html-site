<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="患者診療記録">患者診療記録</title>
    <link rel="stylesheet" href="maintab.css">
    <link rel="stylesheet" href="d_footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- 多言語（他ページと同様に multilang.js を使用） -->
    <script src="multilang.js"></script>
    
    <style>
        /* 患者情報表示エリアのスタイル */
        .patient-info-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }
        
        .patient-header {
            background: linear-gradient(135deg, #2196f3, #21cbf3);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .patient-name {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .patient-details {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .info-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.1);
            border: 1px solid #e3f2fd;
        }
        
        .section-title {
            color: #2196f3;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .quiz-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #2196f3;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #2196f3;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
        
        .quiz-history {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .quiz-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #4caf50;
        }
        
        .quiz-item.poor {
            border-left-color: #f44336;
        }
        
        .quiz-item.good {
            border-left-color: #ff9800;
        }
        
        .quiz-date {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }
        
        .quiz-score {
            font-weight: 600;
            color: #2196f3;
        }
        
        .memo-history {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .memo-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #2196f3;
        }
        
        .memo-date {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }
        
        .memo-content {
            font-size: 0.95em;
        }
        
        .no-data {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }
        
        /* 患者リストのスタイル */
        .flex-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            min-height: 70vh;
        }
        
        .patient-list-panel {
            flex: 0 0 300px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.1);
            border: 1px solid #e3f2fd;
        }
        
        .patient-list-panel h2 {
            color: #2196f3;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            height: 30px;
            padding: 3px 1px 3px 4px;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            font-size: 0.8em;
            outline: none;
            background: #f1f5f9;
            transition: border-color 0.2s, background-color .2s;
        }
        
        .search-box input:focus {
            border-color: #2196f3;
            background: #fff;
        }
        
        .search-box i {
            position: absolute;
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.75em;
        }
        
        .chat-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .patient-item-hidden {
            display: none;
        }

        .show-more-btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: #f8f9fa;
            border: 1px solid #e3f2fd;
            border-radius: 8px;
            color: #2196f3;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.2s;
        }

        .show-more-btn:hover {
            background: #e3f2fd;
        }

        /* ハンバーガーメニュー */
        .hamburger-menu {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #2196f3;
            cursor: pointer;
            padding: 5px;
        }

        /* サイドバーオーバーレイ */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9998;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* サイドバー（モバイル用） */
        .patient-list-sidebar {
            position: fixed;
            top: 0;
            left: -100%;
            width: 280px;
            max-width: 85%;
            height: 100vh;
            background: #fff;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            transition: left 0.3s ease;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .patient-list-sidebar.active {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e3f2fd;
        }

        .sidebar-header h2 {
            color: #2196f3;
            font-size: 1.2em;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-sidebar-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #666;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
        }

        .close-sidebar-btn:hover {
            color: #2196f3;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            border: 1px solid transparent;
        }
        
        .chat-item:hover {
            background-color: #f8f9fa;
        }
        
        .chat-item.selected {
            background-color: #e3f2fd;
            border-color: #2196f3;
        }

        /* モバイル：リスト専用ペイン（PCでは非表示） */
        .mobile-list-pane {
            display: none;
        }

        .mobile-patient-list-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 12px 0;
            color: #151c27;
        }
        
        .doctor-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2196f3, #21cbf3);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-right: 12px;
            font-size: 0.9em;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .doctor-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .last-message {
            font-size: 0.85em;
            color: #666;
        }
        
        .patient-info-container {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.1);
            border: 1px solid #e3f2fd;
        }

        /* モーダルスタイル */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 2% auto;
            padding: 20px;
            border-radius: 12px;
            border: none;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .modal-title {
            color: #2196f3;
            font-size: 1.3em;
            font-weight: 600;
        }

        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .close:hover {
            color: #000;
        }

        .modal-body {
            margin-bottom: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: #2196f3;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: background-color 0.3s;
            min-width: 100px;
        }

        .btn-primary {
            background-color: #2196f3;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1976d2;
        }

        .btn-secondary {
            background-color: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background-color: #e0e0e0;
        }

        /* --- モバイル専用デザインの調整 --- */

        /* 1. デフォルト（PC）ではモバイル用ナビを隠す */
        .mobile-nav {
            display: none;
        }

        /* 2. モバイル画面（768px以下）の設定 */
        @media (max-width: 768px) {
            /* PC用ナビを隠す */
            .tab-menu {
                display: none;
            }

            /* ヘッダーを画像のようなシンプル構成に */
            .top-bar {
                padding: 10px 15px;
                border-bottom: 1px solid #eee;
            }
            
            .header-inner {
                justify-content: space-between;
            }

            .logo span {
                font-size: 1.1rem;
            }

            /* 下部ナビゲーションを表示 */
            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 70px;
                background: #f8f9fa;
                border-top: 1px solid #eee;
                justify-content: space-around;
                align-items: center;
                z-index: 1000;
                padding-bottom: env(safe-area-inset-bottom); /* iPhoneのバー対策 */
            }

            .nav-item {
                text-decoration: none;
                color: #888;
                display: flex;
                flex-direction: column;
                align-items: center;
                font-size: 0.7rem;
                gap: 4px;
            }

            .nav-item i {
                font-size: 1.4rem;
            }

            .nav-item.active {
                color: #333; /* 選択中の色 */
            }

            /* メインコンテンツの下部に余白を追加（ナビに被らないように） */
            body {
                padding-bottom: 80px;
            }
            
            /* レイアウトを縦並びに */
            .flex-container {
                flex-direction: column;
                gap: 0;
                padding: 70px 0 80px 0;
            }

            /* ハンバーガーメニューを非表示（画像にはない） */
            .hamburger-menu {
                display: none;
            }

            /* PC版の患者リストパネルを非表示 */
            .patient-list-panel {
                display: none;
            }

            /* モバイル：リスト専用ペイン（詳細と切り替え） */
            .list-mobile-root {
                flex: 1;
                min-height: 0;
                display: flex;
                flex-direction: column;
            }

            .mobile-list-pane {
                display: flex;
                flex-direction: column;
                flex: 1;
                min-height: 0;
                padding: 0 2vw 12px;
                box-sizing: border-box;
            }

            .mobile-list-pane .search-box {
                margin-bottom: 12px;
            }

            .mobile-list-pane .search-box input {
                width: 100%;
                height: 40px;
                padding: 8px 35px 8px 12px;
                border: 1px solid rgba(191, 199, 212, 0.35);
                border-radius: 10px;
                font-size: 1em;
                background: #f0f3ff;
            }

            .mobile-list-pane .chat-list {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .mobile-list-pane .chat-item {
                padding: 14px 12px;
                border-radius: 12px;
                margin-bottom: 8px;
            }

            .mobile-list-pane .doctor-avatar {
                width: 40px;
                height: 40px;
                font-size: 1.2em;
            }

            .mobile-list-pane .doctor-name {
                font-size: 1em;
            }

            .patient-info-container {
                width: 100%;
                min-width: 0;
                padding: 0 2vw 20px 2vw;
                display: none;
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .list-mobile-root.mobile-show-detail .mobile-list-pane {
                display: none;
            }

            .list-mobile-root.mobile-show-detail .patient-info-container {
                display: flex;
                flex-direction: column;
            }

            /* PC版のフッターをスマホでは隠す（ナビがあるため） */
            .footer {
                display: none;
            }
        }

        /* ===== Restorative Ledger overrides ===== */
        .patient-list-panel,
        .patient-info-container,
        .info-section {
            background: #f9f9ff;
            border: none;
            box-shadow: 0 4px 24px rgba(0, 97, 164, 0.06);
        }

        .patient-header {
            background: linear-gradient(135deg, #0061a4, #2196f3);
            border-radius: 16px;
        }

        .chat-item:hover,
        .chat-item.selected {
            background: #dce2f3;
        }

        .doctor-avatar {
            background: linear-gradient(135deg, #0061a4, #2196f3);
            color: #fff;
        }

        .search-box input {
            background: #f0f3ff;
            border: none;
            border-bottom: 2px solid rgba(191, 199, 212, 0.4);
        }

        .search-box input:focus {
            border-bottom-color: #0061a4;
            background: #fff;
        }
    </style>
</head>
<body>
    <!-- 💚 ヘッダー -->
    <header class="top-bar">
        <div class="header-inner">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="hamburger-menu" id="hamburgerMenu">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="logo" style="font-size:2rem; font-weight:700; color:#2196f3; letter-spacing:0.08em; display:flex; align-items:center;">
                    <span data-translate="site_title" style="vertical-align:middle;">結核治療アプリ</span>
                </div>
            </div>
            <nav>
                <ul class="tab-menu">
                    <li><a href="list.html" class="active">👥 <span data-translate="患者診療記録">患者診療記録</span></a></li>
                    <li><a href="chat.html">📅 <span data-translate="チャット">チャット</span></a></li>
                    <li><a href="docterprofile.html">🏥 <span data-translate="プロフィール">プロフィール</span></a></li>
                </ul>
            </nav>
            <div class="rl-header-actions">
                <a href="help.html" class="rl-icon-btn" title="ヘルプ・操作ガイド" aria-label="ヘルプ・操作ガイド">
                    <i class="fas fa-circle-question"></i>
                </a>
                <div class="rl-profile-pill">
                    <span class="rl-avatar" id="headerStaffAvatar">保</span>
                    <span class="rl-meta" id="headerStaffName">保健師</span>
                </div>
            </div>
        </div>
    </header>
    <section class="rl-subheader">
        <div class="rl-kpi-card">
            <span class="rl-kpi-label">担当患者数</span>
            <span class="rl-kpi-value" id="kpiListAssignedPatients">0名</span>
        </div>
        <div class="rl-kpi-card">
            <span class="rl-kpi-label">要注意患者</span>
            <span class="rl-kpi-value">-</span>
        </div>
        <div class="rl-kpi-card">
            <span class="rl-kpi-label">最終同期</span>
            <span class="rl-kpi-value" id="kpiListLastSync">--:--</span>
        </div>
    </section>

    <!-- サイドバーオーバーレイ -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- サイドバー（モバイル用） -->
    <div class="patient-list-sidebar" id="patientListSidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-user-friends"></i> <span data-translate="担当患者リスト">担当患者リスト</span></h2>
            <button class="close-sidebar-btn" id="closeSidebarBtn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="search-box">
            <input type="text" id="patientSearchSidebar" placeholder="患者を検索...">
            <i class="fas fa-search"></i>
        </div>
        <div class="chat-list" id="patientListSidebarContent"></div>
    </div>
        
    <div class="flex-container list-mobile-root" style="padding-top: 16px;">
        <!-- モバイル専用：患者リスト（詳細画面と切り替え） -->
        <div class="mobile-list-pane" id="mobileListPane">
            <h2 class="mobile-patient-list-header"><i class="fas fa-user-friends"></i> <span data-translate="担当患者リスト">担当患者リスト</span></h2>
            <div class="search-box">
                <input type="text" id="patientSearchMobile" placeholder="患者を検索..." data-translate="患者を検索...">
                <i class="fas fa-search"></i>
            </div>
            <div class="chat-list" id="patientListMobile"></div>
        </div>
        <div class="patient-list-panel">
            <h2><i class="fas fa-user-friends"></i> <span data-translate="担当患者リスト">担当患者リスト</span></h2>
            <div class="search-box">
                <input type="text" id="patientSearch" data-translate="患者を検索..." placeholder="患者を検索...">
                <i class="fas fa-search"></i>
            </div>
            <div class="chat-list" id="patientList"></div>
        </div>
        <div class="patient-info-container" id="patientInfoArea">
            <div class="no-data">
                <i class="fas fa-user" style="font-size: 3em; color: #ccc; margin-bottom: 15px;"></i>
                <p>患者を選択してください</p>
            </div>
        </div>
    </div>

    <!-- モバイル用ナビゲーション -->
    <nav class="mobile-nav">
        <a href="list.html" class="nav-item active">
            <i class="fa-solid fa-clipboard-list"></i>
            <span data-translate="患者診療記録">患者診療記録</span>
        </a>
        <a href="chat.html" class="nav-item">
            <i class="fa-solid fa-comments"></i>
            <span data-translate="チャット">チャット</span>
        </a>
        <a href="docterprofile.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span data-translate="プロフィール">プロフィール</span>
        </a>
    </nav>
    
    <!-- フッター -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="#" data-translate="terms">利用規約</a>
                    <a href="#" data-translate="privacy">プライバシーポリシー</a>
                </div>
                <div class="footer-copyright">
                    <small data-translate="copyright_name">© 2024 医療管理アプリ. All rights reserved.</small>
                </div>
            </div>
        </div>
    </footer>

    <!-- 診察記録追加モーダル -->
    <div id="memoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-notes-medical"></i> 診察記録を追加
                </h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="memoModalForm">
                    <div class="form-group">
                        <label class="form-label">

        const patientsSnapshot1 = await db.collection('users')
          .where('role', '==', 'patient')
          .where('assignedDoctor', '==', currentUserId)

        patientsSnapshot1.forEach(doc => {

    function renderPatientList(targetDiv = null) {

        return;

      const hasMore = patients.length > maxVisible;
      
      patients.forEach((patient, index) => {
        const item = document.createElement('div');
        const isHidden = index >= maxVisible;
        item.className = 'chat-item' + (selectedPatientId === patient.id ? ' selected' : '') + (isHidden ? ' patient-item-hidden' : '');

          selectPatient(patient.id);

        <form id="memoInlineForm">

          <div class="memo-field">

            <textarea class="memo-input" id="memoInlinePrescription" rows="3" placeholder="処方した薬や治療内容を記録してください"></textarea>

        </form>
        <div class="memo-history">
          <h3><i class="fas fa-history"></i> メモ履歴 (${memos.length}件)</h3>
          ${memos.length === 0 ? '<p style="color:var(--text-color-muted,#4A4A4A);margin:12px 0;">メモはまだありません</p>' : memos.map(memo => `
            <div class="memo-entry">
              <div class="memo-header">
                <div class="memo-date"><i class="fas fa-calendar-day"></i> ${memo.date}</div>
                <div class="memo-doctor" style="font-size:0.9em;color:#666;">
                  <i class="fas fa-user-md"></i> ${memo.doctorName || '医師'}
                </div>
              </div>
              <div class="memo-content">
                ${memo.condition ? `<div class="memo-item"><span class="memo-label"><i class="fas fa-stethoscope"></i> 病状:</span><span>${memo.condition}</span></div>` : ''}
                ${memo.prescription ? `<div class="memo-item"><span class="memo-label"><i class="fas fa-pills"></i> 処方箋:</span><span>${memo.prescription}</span></div>` : ''}
                ${memo.other ? `<div class="memo-item"><span class="memo-label"><i class="fas fa-pen"></i> その他:</span><span>${memo.other}</span></div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('memoInlineForm').onsubmit = async function(e) {
        e.preventDefault();
        
        // 現在の日時を取得
        const now = new Date();
        const currentDate = now.toISOString().split('T')[0];
        
        const newMemo = {
          date: document.getElementById('memoInlineDate').value || currentDate,
          condition: document.getElementById('memoInlineCondition').value,
          prescription: document.getElementById('memoInlinePrescription').value,
          other: document.getElementById('memoInlineOther').value,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          doctorId: currentUserId,
          doctorName: firebase.auth().currentUser?.displayName || '医師'
        };
        
        if (!newMemo.condition && !newMemo.prescription && !newMemo.other) {
          alert('少なくとも病状、処方箋、その他のいずれかを入力してください');
          return;
        }
        
        try {
          const patientDoc = await db.collection('users').doc(patient.id).get();
          if (!patientDoc.exists) {
            alert('患者のデータが Firestore に見つかりません。');
            return;
          }
          const pdata = patientDoc.data();
          const existingMemos = (pdata && Array.isArray(pdata.memos)) ? pdata.memos : [];
          
          // 新しいメモを配列の先頭に追加
          existingMemos.unshift(newMemo);
          
          // Firebaseに保存
          await db.collection('users').doc(patient.id).update({ 
            memos: existingMemos,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
          });
          
          // 成功メッセージ
          alert('診断メモが正常に保存されました！');
          
          // フォームをクリア
          document.getElementById('memoInlineCondition').value = '';
          document.getElementById('memoInlinePrescription').value = '';
          document.getElementById('memoInlineOther').value = '';
          document.getElementById('memoInlineDate').value = currentDate;
          
          // 患者情報を再読み込み
          await selectPatient(patient.id);
          
        } catch (error) {
          console.error('メモ保存エラー:', error);
          alert('メモの保存に失敗しました: ' + error.message);
        }
      };
    }

    // クイズ結果を取得する関数（personalized_quiz_scores と ai_quiz_scores の両方から取得してマージ）
    async function getQuizResults(patientEmail, patientId) {
      const emptyResult = {
        totalQuizzes: 0,
        averageAccuracy: 0,
        bestScore: 0,
        recentQuizzes: 0,
        recentQuizzesList: []
      };
      if (!patientEmail && !patientId) {
        return emptyResult;
      }

      // 1件のドキュメントを表示用の共通形式に正規化（score, total, createdAt: { seconds }）
      function normalizeQuiz(doc) {
        const data = doc.data ? doc.data() : doc;
        const id = doc.id;
        // personalized_quiz_scores: timestamp, correct/score, total, accuracy
        // ai_quiz_scores: createdAt, score, total
        const scoreVal = data.correct ?? data.score ?? 0;
        const totalVal = data.total ?? 10;
        const createdAt = data.timestamp || data.createdAt;
        return {
          id,
          score: scoreVal,
          total: totalVal,
          createdAt: createdAt || { seconds: Math.floor(Date.now() / 1000) }
        };
      }

      try {
        const seenIds = new Set();
        const allQuizzes = [];

        // personalized_quiz_scores（score.html で保存されるクイズ結果）を取得
        if (patientEmail) {
          const personalizedSnapshot = await db.collection('personalized_quiz_scores')
            .where('userEmail', '==', patientEmail)
            .get();
          personalizedSnapshot.docs.forEach(doc => {
            if (!seenIds.has(doc.id)) {
              seenIds.add(doc.id);
              allQuizzes.push(normalizeQuiz(doc));
            }
          });
        }
        if (patientId) {
          const byUserIdSnapshot = await db.collection('personalized_quiz_scores')
            .where('userId', '==', patientId)
            .get();
          byUserIdSnapshot.docs.forEach(doc => {
            if (!seenIds.has(doc.id)) {
              seenIds.add(doc.id);
              allQuizzes.push(normalizeQuiz(doc));
            }
          });
        }

        // ai_quiz_scores からも取得（既存データとの互換）
        if (patientEmail) {
          const aiSnapshot = await db.collection('ai_quiz_scores')
            .where('userEmail', '==', patientEmail)
            .get();
          aiSnapshot.docs.forEach(doc => {
            if (!seenIds.has(doc.id)) {
              seenIds.add(doc.id);
              allQuizzes.push(normalizeQuiz(doc));
            }
          });
        }

        if (allQuizzes.length === 0) {
          return emptyResult;
        }

        // クライアント側でタイムスタンプ順にソート（新しい順）
        allQuizzes.sort((a, b) => {
          const secA = a.createdAt && a.createdAt.seconds != null ? a.createdAt.seconds : 0;
          const secB = b.createdAt && b.createdAt.seconds != null ? b.createdAt.seconds : 0;
          return secB - secA;
        });

        const totalQuizzes = allQuizzes.length;
        let totalAccuracy = 0;
        let maxAccuracy = 0;

        allQuizzes.forEach(quiz => {
          const total = quiz.total || 0;
          const accuracy = total > 0 ? (quiz.score / total) * 100 : 0;
          totalAccuracy += accuracy;
          maxAccuracy = Math.max(maxAccuracy, accuracy);
        });

        const averageAccuracy = Math.round(totalAccuracy / totalQuizzes);
        const bestScore = Math.round(maxAccuracy);

        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
        const recentQuizzes = allQuizzes.filter(quiz => {
          const sec = quiz.createdAt && quiz.createdAt.seconds != null ? quiz.createdAt.seconds : 0;
          return new Date(sec * 1000) >= sevenDaysAgo;
        }).length;

        const recentQuizzesList = allQuizzes.slice(0, 5);

        return {
          totalQuizzes,
          averageAccuracy,
          bestScore,
          recentQuizzes,
          recentQuizzesList
        };
      } catch (error) {
        console.error('クイズ結果取得エラー:', error);
        return emptyResult;
      }
    }

    // 検索機能（PC版とサイドバー版の両方に対応）
    function setupSearch(inputId, listSelector) {
      const searchInput = document.getElementById(inputId);
      if (!searchInput) return;
      
      searchInput.addEventListener('input', function(e) {
        const searchText = e.target.value.toLowerCase();
        const container = searchInput.closest('.patient-list-panel')
          || searchInput.closest('.patient-list-sidebar')
          || searchInput.closest('.mobile-list-pane');
        const items = container ? container.querySelectorAll(listSelector) : document.querySelectorAll(listSelector);
        items.forEach(item => {
          const nameEl = item.querySelector('.doctor-name');
          if (nameEl) {
            const name = nameEl.textContent.toLowerCase();
            item.style.display = name.includes(searchText) ? 'flex' : 'none';
          }
        });
      });
    }

    // ハンバーガーメニューの開閉
    function openSidebar() {
      const sidebar = document.getElementById('patientListSidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (sidebar && overlay) {
        sidebar.classList.add('active');
        overlay.classList.add('active');
        // サイドバーに患者リストを表示
        const sidebarContent = document.getElementById('patientListSidebarContent');
        if (sidebarContent) {
          renderPatientList(sidebarContent);
        }
      }
    }

    function closeSidebar() {
      const sidebar = document.getElementById('patientListSidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (sidebar && overlay) {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
      }
    }

    // イベントリスナーの設定
    document.addEventListener('DOMContentLoaded', function() {
      // PC版の検索
      setupSearch('patientSearch', '.chat-item');
      
      // モバイル版の検索
      setupSearch('patientSearchMobile', '.chat-item');
      
      // サイドバー版の検索
      setupSearch('patientSearchSidebar', '.chat-item');
      
      // ハンバーガーメニューボタン
      const hamburgerBtn = document.getElementById('hamburgerMenu');
      if (hamburgerBtn) {
        hamburgerBtn.addEventListener('click', openSidebar);
      }
      
      // サイドバー閉じるボタン
      const closeSidebarBtn = document.getElementById('closeSidebarBtn');
      if (closeSidebarBtn) {
        closeSidebarBtn.addEventListener('click', closeSidebar);
      }
      
      // オーバーレイクリックで閉じる
      const overlay = document.getElementById('sidebarOverlay');
      if (overlay) {
        overlay.addEventListener('click', closeSidebar);
      }

      // 画面幅に応じてモバイルのリスト/詳細切り替えを調整
      window.addEventListener('resize', function() {
        const root = document.querySelector('.flex-container.list-mobile-root');
        if (!root) return;
        if (window.innerWidth > 768) {
          root.classList.remove('mobile-show-detail');
        } else if (selectedPatientId) {
          root.classList.add('mobile-show-detail');
        }
      });
    });

    // モーダル機能を追加
    let currentPatientForMemos = null;

    // モーダルを開く関数
    function openMemoModal(patient) {
      console.log('openMemoModal called with patient:', patient);
      
      if (!patient || !patient.id) {
        alert('患者情報が正しくありません');
        return;
      }
      
      currentPatientForMemos = patient;
      const modal = document.getElementById('memoModal');
      const memoDateInput = document.getElementById('memoModalDate');
      
      const today = new Date().toISOString().split('T')[0];
      if (!memoDateInput) {
        console.error('memoModalDate が見つかりません');
        return;
      }
      memoDateInput.value = today;
      
      const mc = document.getElementById('memoModalCondition');
      const mp = document.getElementById('memoModalPrescription');
      const mo = document.getElementById('memoModalOther');
      if (mc) mc.value = '';
      if (mp) mp.value = '';
      if (mo) mo.value = '';
      
      modal.style.display = 'block';
      
      // モーダルが表示された後、少し待ってからスクロール位置を調整
      setTimeout(() => {
        const modalContent = modal.querySelector('.modal-content');
        if (modalContent) {
          modalContent.scrollTop = 0;
        }
      }, 100);
    }

    // モーダルを閉じる関数
    function closeMemoModal() {
      const modal = document.getElementById('memoModal');
      modal.style.display = 'none';
      currentPatientForMemos = null;
    }

    // 診察記録を保存する関数
    async function saveMemo() {
      console.log('saveMemo called, currentPatientForMemos:', currentPatientForMemos);
      
      if (!currentPatientForMemos || !currentPatientForMemos.id) {
        alert('患者情報が見つかりません。患者を選択し直してください。');
        closeMemoModal();
        return;
      }

      const patientId = currentPatientForMemos.id;
      const elDate = document.getElementById('memoModalDate');
      const elCond = document.getElementById('memoModalCondition');
      const elPre = document.getElementById('memoModalPrescription');
      const elOth = document.getElementById('memoModalOther');
      if (!elDate || !elCond || !elPre || !elOth) {
        console.error('診察記録フォーム要素が見つかりません', { elDate, elCond, elPre, elOth });
        alert('フォームの読み込みに失敗しました。ページを再読み込みしてください。');
        return;
      }

      const condition = elCond.value.trim();
      const prescription = elPre.value.trim();
      const other = elOth.value.trim();
      const date = elDate.value;

      if (!condition) {
        alert('病状を入力してください');
        return;
      }

      try {
        console.log('Saving memo for patient:', patientId);

        const patientDoc = await db.collection('users').doc(patientId).get();
        if (!patientDoc.exists) {
          alert('患者のデータが Firestore に見つかりません。管理者に連絡してください。');
          return;
        }
        const pdata = patientDoc.data();
        const existingMemos = (pdata && Array.isArray(pdata.memos)) ? pdata.memos : [];

        const newMemo = {
          date: date,
          condition: condition,
          prescription: prescription,
          other: other,
          createdAt: new Date().toISOString(),
          doctorId: currentUserId,
          doctorName: firebase.auth().currentUser?.displayName || '医師'
        };

        existingMemos.unshift(newMemo);

        await db.collection('users').doc(patientId).update({
          memos: existingMemos,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        });

        alert('診察記録が保存されました');
        closeMemoModal();

        await selectPatient(patientId);

      } catch (error) {
        console.error('診察記録保存エラー:', error);
        alert('診察記録の保存に失敗しました: ' + error.message);
      }
    }

    // イベントリスナーを追加
    document.addEventListener('DOMContentLoaded', function() {
      const modal = document.getElementById('memoModal');
      const closeBtn = document.querySelector('.close');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const saveMemoBtn = document.getElementById('saveMemoBtn');

      if (closeBtn) {
        closeBtn.onclick = closeMemoModal;
      }

      if (closeModalBtn) {
        closeModalBtn.onclick = closeMemoModal;
      }

      if (saveMemoBtn) {
        saveMemoBtn.onclick = saveMemo;
      }

      // モーダル外をクリックしたら閉じる
      window.onclick = function(event) {
        if (event.target === modal) {
          closeMemoModal();
        }
      }
    });
    </script>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>動画視聴アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
        /* 色のテーマ変数（ピンク系） */
        --color-pink-light: #FFE4E8;
        --color-pink: #FFB6C1;
        --color-pink-dark: #FF7080;
        --color-pink-accent: #FF4D6D;
        --color-pink-gradient: #FF8FA3;
        --primary-color: var(--color-pink);
        --secondary-color: var(--color-pink-dark);
        --accent-color: var(--color-pink-accent);
        --background-color: #FFF5F6;
        --text-color: #1A1A1A;
        --shadow-color: rgba(255, 112, 128, 0.15);
        --card-bg: rgba(255, 255, 255, 0.95);
        --todo-bg: var(--card-bg);
    }
    body {
        /* ページ全体の背景グラデーションとレイアウト */
        background: linear-gradient(135deg, var(--color-pink-light), var(--color-pink));
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        padding: 20px;
        font-family: 'Noto Sans JP', sans-serif;
    }
    .container {
        /* メインの白いカード部分のレイアウト */
        width: 100%;
        max-width: 1500px;
        background: var(--card-bg);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 8px 24px var(--shadow-color);
        margin: 0 auto;
    }
    .header {
        /* タイトル部分 */
        text-align: center;
        margin-bottom: 30px;
    }
    .header h1 {
        font-size: 2.5rem;
        color: var(--primary-color);
        margin: 0;
        padding: 20px 0;
    }

    /* 医師向けの追加スタイル（未使用部分も含む） */
    .patient-list {
        margin-top: 20px;
    }
    .patient-item {
        padding: 15px;
        border-left: 4px solid var(--primary-color);
        background: white;
        margin-bottom: 10px;
        border-radius: 4px;
        box-shadow: 0 2px 4px var(--shadow-color);
    }
    .patient-item h3 {
        margin: 0 0 5px 0;
        color: var(--text-color);
    }
    .patient-info {
        font-size: 14px;
        color: #666;
    }
    .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
        margin-left: 8px;
    }
    .status-urgent {
        background: #FFEBEE;
        color: #D32F2F;
    }
    .status-normal {
        background: #E8F5E9;
        color: #2E7D32;
    }

    /* タブメニューのデザイン */
    .tab-header {
        display: flex;
        justify-content: center;
        gap: 12px;
        background-color: var(--primary-color);
        border-radius: 25px;
        padding: 6px;
        box-shadow: 0 4px 12px var(--shadow-color);
        margin-bottom: 30px;
    }
    
      .tab-button {
          padding: 12px 25px; /* タブボタンの内側余白 */
          background: transparent; /* 背景は透明 */
          border: none; /* 枠線なし */
          border-radius: 20px; /* 角丸 */
          cursor: pointer; /* カーソルをポインターに */
          font-size: 18px; /* 文字サイズ */
          font-weight: 500; /* 文字の太さ */
          color: rgba(255, 255, 255, 0.8); /* 文字色（半透明の白） */
          transition: all 0.3s ease; /* ホバー時などのアニメーション */
          display: flex; /* アイコンとテキストを横並びに */
          align-items: center; /* 垂直中央揃え */
          gap: 6px; /* アイコンとテキストの間隔 */
      }
      
    .tab-button.active {
        background: white;
        color: var(--primary-color);
        box-shadow: 0 2px 10px var(--shadow-color);
    }
    /* --- 動画セクション --- */
    .movie-section {
        /* 動画カード全体の背景とレイアウト */
        margin-top: 30px;
        /* 背景色を白に設定 */
        background: #fff;
        /* 角を丸くする */
        border-radius: 16px;
        /* 影を付けて浮き上がらせる */
        box-shadow: 0 2px 8px var(--shadow-color);
        /* 内側の余白を設定（上, 右, 下, 左） */
        padding: 32px 24px 28px 24px;
        /* 子要素を縦並びにする */
        display: flex;
        flex-direction: column;
        /* 子要素を中央揃えにする */
        align-items: center;
        max-width: 1200px;
        width: 100%;
    }
    .movie-section h2 {
        color: var(--primary-color);
        font-size: 2rem;
        margin-bottom: 18px;
        font-weight: 700;
        letter-spacing: 0.05em;
    }
    .movie-search-row {
        /* 検索バーの行 */
        width: 100%;
        max-width: 500px;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        margin-top: 8px;
    }
    .movie-search-row input[type="text"] {
        flex: 1;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 1rem;
        background: #f8f8f8;
        transition: border 0.2s;
    }
    .movie-search-row input[type="text"]:focus {
        border: 1.5px solid var(--primary-color);
        outline: none;
        background: #fff;
    }
    .movie-search-row button {
        background: var(--primary-color);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
    }
    .movie-search-row button:hover {
        background: var(--color-pink-dark);
    }
    .movie-buttons {
        /* 各動画カテゴリのボタン群 */
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
        margin-bottom: 18px;
        margin-top: 8px;
    }
    .movie-buttons button {
        background: var(--color-pink-light);
        color: var(--primary-color);
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        font-size: 1.05rem;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 1px 4px var(--shadow-color);
        transition: background 0.2s, color 0.2s;
    }
    .movie-buttons button.active,
    .movie-buttons button:focus {
        background: var(--primary-color);
        color: #fff;
        outline: none;
    }
    #info-content {
        /* 動画説明や動画本体の表示エリア */
        margin-top: 20px;
        padding: 30px 40px;
        border: 1px solid #eee;
        border-radius: 8px;
        background: #f9f9f9;
        min-height: 100px;
        width: 100%;
        max-width: 1000px;
        font-size: 1.08rem;
        color: #333;
        box-shadow: 0 1px 4px var(--shadow-color);
        display: none;
        transition: box-shadow 0.2s;
    }
    /* 複数動画用レイアウト（未使用） */
    .video-multi-row {
        display: flex;
        gap: 200px;
        justify-content: center;
        align-items: flex-start;
        margin-top: 100px;
        margin-bottom: 10px;
        flex-wrap: wrap;
    }
    .video-multi-row iframe {
        flex: 1 1 300px;
        max-width: 32%;
        min-width: 250px;
        height: 220px;
        border-radius: 12px;
        box-shadow: 0 2px 8px var(--shadow-color);
        background: #000;
    }
    @media (max-width: 900px) {
        .video-multi-row {
            flex-direction: column;
            gap: 16px;
        }
        .video-multi-row iframe {
            max-width: 100%;
            min-width: 0;
            height: 200px;
        }
    }
    @media (max-width: 600px) {
        .container {
            padding: 10px;
        }
        .movie-section {
            padding: 16px 4px 16px 4px;
        }
        .movie-search-row {
            flex-direction: column;
            gap: 8px;
        }
        .movie-buttons {
            gap: 8px;
        }
        #info-content {
            padding: 12px 6px;
        }
    }
    /* サブ動画ボタン用スタイル */
    .sub-video-btn {
      margin: 0 8px 12px 8px;
      padding: 8px 20px;
      border: 2px solid var(--primary-color);/*ボタン*/
      border-radius: 80px;
      background: #fff;
      color: var(--primary-color);
      font-weight: 1000;
      cursor: pointer;
      transition: background 0.9s, color 0.2s;
    }
    .sub-video-btn.active, .sub-video-btn:focus {
      background: var(--primary-color);
      color: #fff;
      outline: none;
    }
    #about-video-player {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    #about-video-player iframe {
      width: 2000px;
      max-width: 100vw;
      height: 1125px; /* 16:9比率で2000px幅の場合 */
      border-radius: 16px;
      box-shadow: 0 4px 16px var(--shadow-color);
      background: #000;
      margin: 0;
      display: block;
    }
    
    #about-video-player video {
      width: 100%;
      max-width: 1200px;
      height: 675px; /* 16:9比率で1200px幅の場合 */
      border-radius: 16px;
      box-shadow: 0 4px 16px var(--shadow-color);
      background: #000;
      margin: 0 auto;
      display: block;
    }
    
    @media (max-width: 2000px) {
      #about-video-player iframe {
        width: 100vw;
        height: calc(100vw * 9 / 16);
        min-height: 250px;
        max-height: 90vh;
      }
    }
    
    @media (max-width: 1200px) {
      #about-video-player video {
        width: 100%;
        height: calc(100vw * 9 / 16);
        min-height: 300px;
        max-height: 80vh;
      }
    }
    /* クイズボタン用スタイル */
    .quiz-btn {
      background: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px 30px;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--shadow-color);
      transition: background 0.2s;
    }
    .quiz-btn:hover {
      background: var(--color-pink-dark);
    }
    .quiz-question {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: var(--text-color);
    }
    .quiz-choices {
      display: grid;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .quiz-choice-btn {
      padding: 12px 20px;
      border: 2px solid var(--primary-color);
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1rem;
    }
    .quiz-choice-btn:hover {
      background: var(--color-pink-light);
    }
    .quiz-choice-btn.correct {
      background: #90EE90;
      border-color: #32CD32;
    }
    .quiz-choice-btn.incorrect {
      background: #FFB6C1;
      border-color: #FF69B4;
    }
    .quiz-result {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      font-weight: bold;
    }
    .quiz-result.correct {
      background: #90EE90;
      color: #006400;
    }
    .quiz-result.incorrect {
      background: #FFB6C1;
      color: #8B0000;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>医療情報管理アプリ</h1>
    </div>
    <div class="tab-container">
      <div class="tab-header">
        <button class="tab-button" onclick="location.href='choise.html'">
          <span class="tab-icon">👤</span>
          <span class="tab-text">HOME</span>
        </button>
        <button class="tab-button" onclick="location.href='ai.html'">
          <span class="tab-icon">💬</span>
          <span class="tab-text">チャット</span>
        </button>
        <button class="tab-button" onclick="location.href='score.html'">
          <span class="tab-icon">❓</span>
          <span class="tab-text">Q&A</span>
        </button>
        <button class="tab-button active" onclick="location.href='movie.html'">
          <span class="tab-icon">🎬</span>
          <span class="tab-text">動画視聴</span>
        </button>
        <button class="tab-button" onclick="location.href='profile.html'">
          <span class="tab-icon">👤</span>
          <span class="tab-text">プロフィール</span>
        </button>
      </div>
    </div>

    <div class="movie-section">
      <h2>結核について</h2>
      <div class="movie-search-row">
        <input type="text" id="movie-search-input" placeholder="キーワードで検索..." oninput="filterMovieButtons()" />
        <button onclick="filterMovieButtons()">検索</button>
      </div>
      <div class="movie-buttons" id="movie-buttons">
        <button data-keywords="結核 とは 病気 感染" onclick="showInfo('about', this)">結核とは</button>
        <button data-keywords="検査 方法 X線 喀痰 ツベルクリン IGRA" onclick="showInfo('test', this)">検査方法</button>
        <button data-keywords="治療 方法 薬 服用 期間" onclick="showInfo('treatment', this)">治療方法</button>
        <button data-keywords="感染 対象 免疫 高齢者 乳幼児 糖尿病" onclick="showInfo('target', this)">感染対象</button>
        <button data-keywords="結核 なったら 受診 治療 咳エチケット マスク 換気" onclick="showInfo('if', this)">結核になったら</button>
      </div>
      <div id="info-content"></div>
    </div>
  </div>
  <script>
    // 動画の表示サイズを統一
    const VIDEO_WIDTH = 1000;
    const VIDEO_HEIGHT = 563;

    // 動画ボタンの内容（各カテゴリごとに動画や説明を定義）
    const movieInfos = {
      about: {
        title: "結核とは",
        content: `
          <div id="about-video-buttons" style="text-align:center; margin-bottom: 20px;">
            <button class="sub-video-btn" onclick="showAboutVideo(0)">動画1</button>
            <button class="sub-video-btn" onclick="showAboutVideo(1)">動画2</button>
            <button class="sub-video-btn" onclick="showAboutVideo(2)">動画3</button>
          </div>
          <div id="about-video-player" style="text-align:center;"></div>
          <div id="quiz-section" style="margin-top:30px; text-align:center;">
            <div style="margin-bottom:20px;">
              
            </div>
          </div>
        `
      },
      test: {
        title: "検査方法",
        content: `
          <div id="test-video-buttons" style="text-align:center; margin-bottom: 20px;">
            <button class="sub-video-btn" onclick="showTestVideo(0)">検査方法1</button>
            <button class="sub-video-btn" onclick="showTestVideo(1)">検査方法2</button>
            <button class="sub-video-btn" onclick="showTestVideo(2)">検査方法3</button>
            <button class="sub-video-btn" onclick="showTestVideo(3)">検査方法4</button>
          </div>
          <div id="test-video-player" style="text-align:center;"></div>
          <div id="test-quiz-section" style="margin-top:30px; text-align:center;">
            <button id="start-test-quiz-btn" class="quiz-btn">クイズを開始</button>
            <div id="test-quiz-content" style="display:none;"></div>
          </div>
        `
      },
      treatment: {
        title: "治療方法",
        content: `
          <div id="a-video-buttons" style="text-align:center; margin-bottom: 20px;">
            <button class="sub-video-btn" onclick="showAVideo(0)">治療方法1</button>
            <button class="sub-video-btn" onclick="showAVideo(1)">治療方法2</button>
            <button class="sub-video-btn" onclick="showAVideo(2)">治療方法3</button>
            <button class="sub-video-btn" onclick="showAVideo(3)">治療方法4</button>
          </div>
          <div id="a-video-player" style="text-align:center;"></div>
          <div id="a-quiz-section" style="margin-top:30px; text-align:center;">
            
            <button id="start-a-quiz-btn" class="quiz-btn">クイズを開始</button>
            <div id="a-quiz-content" style="display:none;"></div>
          </div>
        `
      },
      target: {
        title: "感染対象",
        content: `
          <div id="b-video-buttons" style="text-align:center; margin-bottom: 20px;">
            <button class="sub-video-btn" onclick="showBVideo(0)">感染対象1</button>
            <button class="sub-video-btn" onclick="showBVideo(1)">感染対象2</button>
            <button class="sub-video-btn" onclick="showBVideo(2)">感染対象3</button>
            <button class="sub-video-btn" onclick="showBVideo(3)">感染対象4</button>
          </div>
          <div id="b-video-player" style="text-align:center;"></div>
          <div id="b-quiz-section" style="margin-top:30px; text-align:center;">
            <button id="start-b-quiz-btn" class="quiz-btn">クイズを開始</button>
            <div id="b-quiz-content" style="display:none;"></div>
          </div>
        ` 
      },
      if: {
        title: "結核になったら",
        content: `
          <div id="c-video-buttons" style="text-align:center; margin-bottom: 20px;">
            <button class="sub-video-btn" onclick="showCVideo(0)">結核になったら1</button>
            <button class="sub-video-btn" onclick="showCVideo(1)">結核になったら2</button>
            <button class="sub-video-btn" onclick="showCVideo(2)">結核になったら3</button>
            <button class="sub-video-btn" onclick="showCVideo(3)">結核になったら4</button>
          </div>
          <div id="c-video-player" style="text-align:center;"></div>
          <div id="c-quiz-section" style="margin-top:30px; text-align:center;">
            <button id="start-c-quiz-btn" class="quiz-btn">クイズを開始</button>
            <div id="c-quiz-content" style="display:none;"></div>
          </div>
        `
      }
    };

    // ボタンのactive状態管理（カテゴリボタンの選択状態をリセット）
    function clearActiveButtons() {
      const btns = document.querySelectorAll('.movie-buttons button');
      btns.forEach(btn => btn.classList.remove('active'));
    }

    // カテゴリボタンを押したときの処理
    function showInfo(type, btn) {
      const info = movieInfos[type];
      if (!info) return;
      const infoDiv = document.getElementById("info-content");
      infoDiv.innerHTML = `<strong>${info.title}</strong><br>${info.content}`;
      infoDiv.style.display = "block";
      clearActiveButtons();
      if (btn) btn.classList.add('active');
    }

    // 検索機能（キーワードでカテゴリボタンを絞り込み）
    function filterMovieButtons() {
      const input = document.getElementById('movie-search-input').value.trim().toLowerCase();
      const buttons = document.querySelectorAll('#movie-buttons button');
      let anyVisible = false;
      buttons.forEach(btn => {
        const keywords = btn.getAttribute('data-keywords').toLowerCase();
        if (input === "" || keywords.includes(input)) {
          btn.style.display = "";
          anyVisible = true;
        } else {
          btn.style.display = "none";
        }
      });
      // 検索で何もヒットしなかった場合の表示
      const infoDiv = document.getElementById("info-content");
      if (!anyVisible && input !== "") {
        infoDiv.innerHTML = "該当する項目が見つかりませんでした。";
        infoDiv.style.display = "block";
        clearActiveButtons();
      } else if (input === "") {
        infoDiv.innerHTML = "";
        infoDiv.style.display = "none";
        clearActiveButtons();
      }
    }

    // 「結核とは」サブ動画切り替え用
    const aboutVideoIds = [
      "./videos/videostuberculosis_about1.mp4",
      "./videos/videostuberculosis_about2.mp4", 
      "./videos/videostuberculosis_about3.mp4"
    ];
    
    // 検査方法サブ動画切り替え用
    const testVideoIds = [
      "./videos/videostuberculosis_test1.mp4",
      "./videos/videostuberculosis_test2.mp4", 
      "./videos/videostuberculosis_test3.mp4",
      "./videos/videostuberculosis_test4.mp4"
    ];

    // 治療方法サブ動画切り替え用
    const aVideoIds = [
      "./videos/videostuberculosis_a1.mp4",
      "./videos/videostuberculosis_a2.mp4", 
      "./videos/videostuberculosis_a3.mp4",
      "./videos/videostuberculosis_a4.mp4"
    ];

    // 感染対象サブ動画切り替え用
    const bVideoIds = [
      "./videos/videostuberculosis_b1.mp4",
      "./videos/videostuberculosis_b2.mp4", 
      "./videos/videostuberculosis_b3.mp4",
      "./videos/videostuberculosis_b4.mp4"
    ];

    // 結核になったらサブ動画切り替え用
    const cVideoIds = [
      "./videos/videostuberculosis_c1.mp4",
      "./videos/videostuberculosis_c2.mp4", 
      "./videos/videostuberculosis_c3.mp4",
      "./videos/videostuberculosis_c4.mp4"
    ];

    // クイズ問題データ（動画別）
    const quizQuestions = {
      about1: [
        {
          question: "結核とは何の病気ですか？",
          choices: ["細菌による感染症", "ウイルスによる感染症", "遺伝性の病気", "自己免疫疾患"],
          answer: "細菌による感染症"
        },
        {
          question: "結核の主な感染経路はどれですか？",
          choices: ["空気感染", "接触感染", "水系感染", "昆虫媒介"],
          answer: "空気感染"
        },
        {
          question: "結核の原因菌は何ですか？",
          choices: ["結核菌", "インフルエンザウイルス", "黄色ブドウ球菌", "大腸菌"],
          answer: "結核菌"
        }
      ],
      about2: [
        {
          question: "結核の症状で最も特徴的なのは？",
          choices: ["咳が2週間以上続く", "発熱のみ", "腹痛", "頭痛"],
          answer: "咳が2週間以上続く"

    // クイズ回答チェック

      const quizKey = `about${currentVideoIndex + 1}`;

      const currentQuestion = questions[currentQuizIndex];
      const buttons = document.querySelectorAll('#quiz-content .quiz-choice-btn');
      
      // ボタンを無効化
      buttons.forEach(btn => btn.disabled = true);
      
      // 正解・不正解の表示
      buttons.forEach(btn => {
        if (btn.textContent === currentQuestion.answer) {
          btn.classList.add('correct');
        } else if (btn.textContent === selectedAnswer && selectedAnswer !== currentQuestion.answer) {
          btn.classList.add('incorrect');
        }
      });
      
      // 結果表示
      const resultDiv = document.createElement('div');
      if (selectedAnswer === currentQuestion.answer) {
        resultDiv.textContent = '正解です！';
        resultDiv.className = 'quiz-result correct';
        quizScore++;
      } else {
        resultDiv.textContent = `不正解です。正解は ${currentQuestion.answer} でした。`;

        showQuizQuestion();

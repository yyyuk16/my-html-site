<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>動画視聴アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
        --color-pink-light: #FFE4E8;
        --color-pink: #FFB6C1;
        --color-pink-dark: #FF7080;
        --color-pink-accent: #FF4D6D;
        --color-pink-gradient: #FF8FA3;
        --primary-color: var(--color-pink);
        --secondary-color: var(--color-pink-dark);
        --accent-color: var(--color-pink-accent);
        --background-color: #FFF5F6;
        --text-color: #1A1A1A;
        --shadow-color: rgba(255, 112, 128, 0.15);
        --card-bg: rgba(255, 255, 255, 0.95);
        --todo-bg: var(--card-bg);
    }
    body {
        background: linear-gradient(135deg, var(--color-pink-light), var(--color-pink));
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        padding: 20px;
        font-family: 'Noto Sans JP', sans-serif;
    }
    .container {
        width: 100%;
        max-width: 1200px;
        background: var(--card-bg);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 8px 24px var(--shadow-color);
    }
    .header {
        text-align: center;
        margin-bottom: 30px;
    }
    .header h1 {
        font-size: 2.5rem;
        color: var(--primary-color);
        margin: 0;
        padding: 20px 0;
    }

    /* 医師向けの追加スタイル */
    .patient-list {
        margin-top: 20px;
    }

    .patient-item {
        padding: 15px;
        border-left: 4px solid var(--primary-color);
        background: white;
        margin-bottom: 10px;
        border-radius: 4px;
        box-shadow: 0 2px 4px var(--shadow-color);
    }

    .patient-item h3 {
        margin: 0 0 5px 0;
        color: var(--text-color);
    }

    .patient-info {
        font-size: 14px;
        color: #666;
    }

    .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
        margin-left: 8px;
    }

    .status-urgent {
        background: #FFEBEE;
        color: #D32F2F;
    }

    .status-normal {
        background: #E8F5E9;
        color: #2E7D32;
    }

    .tab-header {
        display: flex;
        justify-content: center;
        gap: 12px;
        background-color: var(--primary-color);
        border-radius: 25px;
        padding: 6px;
        box-shadow: 0 4px 12px var(--shadow-color);
        margin-bottom: 30px;
    }
    .tab-button {
        padding: 12px 25px;
        background: transparent;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 18px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.8);
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .tab-button.active {
        background: white;
        color: var(--primary-color);
        box-shadow: 0 2px 10px var(--shadow-color);
    }
    /* --- 動画セクション --- */
    .movie-section {
        margin-top: 30px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 2px 8px var(--shadow-color);
        padding: 32px 24px 28px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .movie-section h2 {
        color: var(--primary-color);
        font-size: 2rem;
        margin-bottom: 18px;
        font-weight: 700;
        letter-spacing: 0.05em;
    }
    .movie-search-row {
        width: 100%;
        max-width: 500px;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        margin-top: 8px;
    }
    .movie-search-row input[type="text"] {
        flex: 1;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 1rem;
        background: #f8f8f8;
        transition: border 0.2s;
    }
    .movie-search-row input[type="text"]:focus {
        border: 1.5px solid var(--primary-color);
        outline: none;
        background: #fff;
    }
    .movie-search-row button {
        background: var(--primary-color);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
    }
    .movie-search-row button:hover {
        background: var(--color-pink-dark);
    }
    .movie-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
        margin-bottom: 18px;
        margin-top: 8px;
    }
    .movie-buttons button {
        background: var(--color-pink-light);
        color: var(--primary-color);
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        font-size: 1.05rem;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 1px 4px var(--shadow-color);
        transition: background 0.2s, color 0.2s;
    }
    .movie-buttons button.active,
    .movie-buttons button:focus {
        background: var(--primary-color);
        color: #fff;
        outline: none;
    }
    #info-content {
        margin-top: 20px;
        padding: 18px 20px;
        border: 1px solid #eee;
        border-radius: 8px;
        background: #f9f9f9;
        min-height: 60px;
        width: 100%;
        max-width: 600px;
        font-size: 1.08rem;
        color: #333;
        box-shadow: 0 1px 4px var(--shadow-color);
        display: none;
        transition: box-shadow 0.2s;
    }
    @media (max-width: 600px) {
        .container {
            padding: 10px;
        }
        .movie-section {
            padding: 16px 4px 16px 4px;
        }
        .movie-search-row {
            flex-direction: column;
            gap: 8px;
        }
        .movie-buttons {
            gap: 8px;
        }
        #info-content {
            padding: 12px 6px;
        }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>医療情報管理アプリ</h1>
    </div>
    <div class="tab-container">
      <div class="tab-header">
        <button class="tab-button" onclick="location.href='choise.html'">
          <span class="tab-icon">👤</span>
          <span class="tab-text">ホーム</span>
        </button>
        <button class="tab-button" onclick="location.href='ai.html'">
          <span class="tab-icon">💬</span>
          <span class="tab-text">チャット</span>
        </button>
        <button class="tab-button" onclick="location.href='score.html'">
          <span class="tab-icon">❓</span>
          <span class="tab-text">Q&A</span>
        </button>
        <button class="tab-button active" onclick="location.href='movie.html'">
          <span class="tab-icon">🎬</span>
          <span class="tab-text">動画視聴</span>
        </button>
        <button class="tab-button" onclick="location.href='profile.html'">
          <span class="tab-icon">👤</span>
          <span class="tab-text">プロフィール</span>
        </button>
      </div>
    </div>

    <div class="movie-section">
      <h2>結核について</h2>
      <div class="movie-search-row">
        <input type="text" id="movie-search-input" placeholder="キーワードで検索..." oninput="filterMovieButtons()" />
        <button onclick="filterMovieButtons()">検索</button>
      </div>
      <div class="movie-buttons" id="movie-buttons">
        <button data-keywords="結核 とは 病気 感染" onclick="showInfo('about', this)">結核とは</button>
        <button data-keywords="検査 方法 X線 喀痰 ツベルクリン IGRA" onclick="showInfo('test', this)">検査方法</button>
        <button data-keywords="治療 方法 薬 服用 期間" onclick="showInfo('treatment', this)">治療方法</button>
        <button data-keywords="感染 対象 免疫 高齢者 乳幼児 糖尿病" onclick="showInfo('target', this)">感染対象</button>
        <button data-keywords="結核 なったら 受診 治療 咳エチケット マスク 換気" onclick="showInfo('if', this)">結核になったら</button>
      </div>
      <div id="info-content"></div>
    </div>
  </div>
  <script>
    // 動画ボタンの内容
    // ※後で動画を埋め込む予定のため、仮の枠だけ用意しています
    const movieInfos = {
      about: {
        title: "結核とは",
        content: `<div style="border:2px dashed #ccc; border-radius:12px; padding:32px; text-align:center; color:#888; background:#f9f9f9;">
          ここに「結核とは」の動画が入ります（準備中）
        </div>`
      },
      test: {
        title: "検査方法",
        content: `<div style="border:2px dashed #ccc; border-radius:12px; padding:32px; text-align:center; color:#888; background:#f9f9f9;">
          ここに「検査方法」の動画が入ります（準備中）
        </div>`
      },
      treatment: {
        title: "治療方法",
        content: `<div style="border:2px dashed #ccc; border-radius:12px; padding:32px; text-align:center; color:#888; background:#f9f9f9;">
          ここに「治療方法」の動画が入ります（準備中）
        </div>`
      },
      target: {
        title: "感染対象",
        content: `<div style="border:2px dashed #ccc; border-radius:12px; padding:32px; text-align:center; color:#888; background:#f9f9f9;">
          ここに「感染対象」の動画が入ります（準備中）
        </div>`
      },
      if: {
        title: "結核になったら",
        content: `<div style="border:2px dashed #ccc; border-radius:12px; padding:32px; text-align:center; color:#888; background:#f9f9f9;">
          ここに「結核になったら」の動画が入ります（準備中）
        </div>`
      }
    };

    // ボタンのactive状態管理
    function clearActiveButtons() {
      const btns = document.querySelectorAll('.movie-buttons button');
      btns.forEach(btn => btn.classList.remove('active'));
    }

    function showInfo(type, btn) {
      const info = movieInfos[type];
      if (!info) return;
      const infoDiv = document.getElementById("info-content");
      infoDiv.innerHTML = `<strong>${info.title}</strong><br>${info.content}`;
      infoDiv.style.display = "block";
      clearActiveButtons();
      if (btn) btn.classList.add('active');
    }

    // 検索機能
    function filterMovieButtons() {
      const input = document.getElementById('movie-search-input').value.trim().toLowerCase();
      const buttons = document.querySelectorAll('#movie-buttons button');
      let anyVisible = false;
      buttons.forEach(btn => {
        const keywords = btn.getAttribute('data-keywords').toLowerCase();
        if (input === "" || keywords.includes(input)) {
          btn.style.display = "";
          anyVisible = true;
        } else {
          btn.style.display = "none";
        }
      });
      // 検索で何もヒットしなかった場合
      const infoDiv = document.getElementById("info-content");
      if (!anyVisible && input !== "") {
        infoDiv.innerHTML = "該当する項目が見つかりませんでした。";
        infoDiv.style.display = "block";
        clearActiveButtons();
      } else if (input === "") {
        infoDiv.innerHTML = "";
        infoDiv.style.display = "none";
        clearActiveButtons();
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>動画視聴アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
        /* 色のテーマ変数（ピンク系） */
        --color-pink-light: #FFE4E8;
        --color-pink: #FFB6C1;
        --color-pink-dark: #FF7080;
        --color-pink-accent: #FF4D6D;
        --color-pink-gradient: #FF8FA3;
        --primary-color: var(--color-pink);
        --secondary-color: var(--color-pink-dark);
        --accent-color: var(--color-pink-accent);
        --background-color: #FFF5F6;
        --text-color: #1A1A1A;
        --shadow-color: rgba(255, 112, 128, 0.15);
        --card-bg: rgba(255, 255, 255, 0.95);
        --todo-bg: var(--card-bg);
    }
    body {
        /* ページ全体の背景グラデーションとレイアウト */
        background: linear-gradient(135deg, var(--color-pink-light), var(--color-pink));
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        padding: 20px;
        font-family: 'Noto Sans JP', sans-serif;
    }
    .container {
        /* メインの白いカード部分のレイアウト */
        width: 100%;
        max-width: 1500px;
        background: var(--card-bg);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 8px 24px var(--shadow-color);
        margin: 0 auto;
    }
    .header {
        /* タイトル部分 */
        text-align: center;
        margin-bottom: 30px;
    }
    .header h1 {
        font-size: 2.5rem;
        color: var(--primary-color);
        margin: 0;
        padding: 20px 0;
    }

    /* 医師向けの追加スタイル（未使用部分も含む） */
    .patient-list {
        margin-top: 20px;
    }
    .patient-item {
        padding: 15px;
        border-left: 4px solid var(--primary-color);
        background: white;
        margin-bottom: 10px;
        border-radius: 4px;
        box-shadow: 0 2px 4px var(--shadow-color);
    }
    .patient-item h3 {
        margin: 0 0 5px 0;
        color: var(--text-color);
    }
    .patient-info {
        font-size: 14px;
        color: #666;
    }
    .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
        margin-left: 8px;
    }
    .status-urgent {
        background: #FFEBEE;
        color: #D32F2F;
    }
    .status-normal {
        background: #E8F5E9;
        color: #2E7D32;
    }

    /* タブメニューのデザイン */
    .tab-header {
        display: flex;
        justify-content: center;
        gap: 12px;
        background-color: var(--primary-color);
        border-radius: 25px;
        padding: 6px;
        box-shadow: 0 4px 12px var(--shadow-color);
        margin-bottom: 30px;
    }
    
      .tab-button {
          padding: 12px 25px; /* タブボタンの内側余白 */
          background: transparent; /* 背景は透明 */
          border: none; /* 枠線なし */
          border-radius: 20px; /* 角丸 */
          cursor: pointer; /* カーソルをポインターに */
          font-size: 18px; /* 文字サイズ */
          font-weight: 500; /* 文字の太さ */
          color: rgba(255, 255, 255, 0.8); /* 文字色（半透明の白） */
          transition: all 0.3s ease; /* ホバー時などのアニメーション */
          display: flex; /* アイコンとテキストを横並びに */
          align-items: center; /* 垂直中央揃え */
          gap: 6px; /* アイコンとテキストの間隔 */
      }
      
    .tab-button.active {
        background: white;
        color: var(--primary-color);
        box-shadow: 0 2px 10px var(--shadow-color);
    }
    /* --- 動画セクション --- */
    .movie-section {
        /* 動画カード全体の背景とレイアウト */
        margin-top: 30px;
        /* 背景色を白に設定 */
        background: #fff;
        /* 角を丸くする */
        border-radius: 16px;
        /* 影を付けて浮き上がらせる */
        box-shadow: 0 2px 8px var(--shadow-color);
        /* 内側の余白を設定（上, 右, 下, 左） */
        padding: 32px 24px 28px 24px;
        /* 子要素を縦並びにする */
        display: flex;
        flex-direction: column;
        /* 子要素を中央揃えにする */
        align-items: center;
        max-width: 1200px;
        width: 100%;
    }
    .movie-section h2 {
        color: var(--primary-color);
        font-size: 2rem;
        margin-bottom: 18px;
        font-weight: 700;
        letter-spacing: 0.05em;
    }
    .movie-search-row {
        /* 検索バーの行 */
        width: 100%;
        max-width: 500px;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        margin-top: 8px;
    }
    .movie-search-row input[type="text"] {
        flex: 1;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 1rem;
        background: #f8f8f8;
        transition: border 0.2s;
    }
    .movie-search-row input[type="text"]:focus {
        border: 1.5px solid var(--primary-color);
        outline: none;
        background: #fff;
    }
    .movie-search-row button {
        background: var(--primary-color);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
    }
    .movie-search-row button:hover {
        background: var(--color-pink-dark);
    }
    .movie-buttons {
        /* 各動画カテゴリのボタン群 */
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
        margin-bottom: 18px;
        margin-top: 8px;
    }
    .movie-buttons button {
        background: var(--color-pink-light);
        color: var(--primary-color);
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        font-size: 1.05rem;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 1px 4px var(--shadow-color);
        transition: background 0.2s, color 0.2s;
    }
    .movie-buttons button.active,
    .movie-buttons button:focus {
        background: var(--primary-color);
        color: #fff;
        outline: none;
    }
    #info-content {
        /* 動画説明や動画本体の表示エリア */
        margin-top: 20px;
        padding: 30px 40px;
        border: 1px solid #eee;
        border-radius: 8px;
        background: #f9f9f9;
        min-height: 100px;
        width: 100%;
        max-width: 1000px;
        font-size: 1.08rem;
        color: #333;
        box-shadow: 0 1px 4px var(--shadow-color);
        display: none;
        transition: box-shadow 0.2s;
    }
    /* 複数動画用レイアウト（未使用） */
    .video-multi-row {
        display: flex;
        gap: 200px;
        justify-content: center;
        align-items: flex-start;
        margin-top: 100px;
        margin-bottom: 10px;
        flex-wrap: wrap;
    }
    .video-multi-row iframe {
        flex: 1 1 300px;
        max-width: 32%;
        min-width: 250px;
        height: 220px;
        border-radius: 12px;
        box-shadow: 0 2px 8px var(--shadow-color);
        background: #000;
    }
    @media (max-width: 900px) {
        .video-multi-row {
            flex-direction: column;
            gap: 16px;
        }
        .video-multi-row iframe {
            max-width: 100%;
            min-width: 0;
            height: 200px;
        }
    }
    @media (max-width: 600px) {
        .container {
            padding: 10px;
        }
        .movie-section {
            padding: 16px 4px 16px 4px;
        }
        .movie-search-row {
            flex-direction: column;
            gap: 8px;
        }
        .movie-buttons {
            gap: 8px;
        }
        #info-content {
            padding: 12px 6px;
        }
    }
    /* サブ動画ボタン用スタイル */
    .sub-video-btn {
      margin: 0 8px 12px 8px;
      padding: 8px 20px;
      border: 2px solid var(--primary-color);/*ボタン*/
      border-radius: 80px;
      background: #fff;
      color: var(--primary-color);
      font-weight: 1000;
      cursor: pointer;
      transition: background 0.9s, color 0.2s;
    }
    .sub-video-btn.active, .sub-video-btn:focus {
      background: var(--primary-color);
      color: #fff;
      outline: none;
    }
    #about-video-player {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    #about-video-player iframe {
      width: 2000px;
      max-width: 100vw;
      height: 1125px; /* 16:9比率で2000px幅の場合 */
      border-radius: 16px;
      box-shadow: 0 4px 16px var(--shadow-color);
      background: #000;
      margin: 0;
      display: block;
    }
    
    #about-video-player video {
      width: 100%;
      max-width: 1200px;
      height: 675px; /* 16:9比率で1200px幅の場合 */
      border-radius: 16px;
      box-shadow: 0 4px 16px var(--shadow-color);
      background: #000;
      margin: 0 auto;
      display: block;
    }
    
    @media (max-width: 2000px) {
      #about-video-player iframe {
        width: 100vw;
        height: calc(100vw * 9 / 16);
        min-height: 250px;
        max-height: 90vh;
      }
    }
    
    @media (max-width: 1200px) {
      #about-video-player video {
        width: 100%;
        height: calc(100vw * 9 / 16);
        min-height: 300px;
        max-height: 80vh;
      }
    }
    /* クイズボタン用スタイル */
    .quiz-btn {
      background: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px 30px;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--shadow-color);
      transition: background 0.2s;
    }
    .quiz-btn:hover {
      background: var(--color-pink-dark);
    }
    .quiz-question {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: var(--text-color);
    }
    .quiz-choices {
      display: grid;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .quiz-choice-btn {
      padding: 12px 20px;
      border: 2px solid var(--primary-color);
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1rem;
    }
    .quiz-choice-btn:hover {
      background: var(--color-pink-light);
    }
    .quiz-choice-btn.correct {
      background: #90EE90;
      border-color: #32CD32;
    }
    .quiz-choice-btn.incorrect {
      background: #FFB6C1;
      border-color: #FF69B4;
    }
    .quiz-result {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      font-weight: bold;
    }
    .quiz-result.correct {
      background: #90EE90;
      color: #006400;
    }
    .quiz-result.incorrect {
      background: #FFB6C1;
      color: #8B0000;
    }
  </style>
</head>

    // ボタンのactive状態管理
    function clearActiveButtons() {
        const btns = document.querySelectorAll('.movie-buttons button');
        btns.forEach(btn => btn.classList.remove('active'));
    }

    // カテゴリボタンを押したときの処理
    function showInfo(type, btn) {
        const info = movieInfos[type];
        if (!info) return;
        const infoDiv = document.getElementById("info-content");
        infoDiv.innerHTML = `<strong>${info.title}</strong><br>${info.content}`;
        infoDiv.style.display = "block";
        clearActiveButtons();
        if (btn) btn.classList.add('active');
    }

    // 検索機能
    function filterMovieButtons() {
        const input = document.getElementById('movie-search-input').value.trim().toLowerCase();
        const buttons = document.querySelectorAll('#movie-buttons button');
        let anyVisible = false;
        buttons.forEach(btn => {
            const keywords = btn.getAttribute('data-keywords').toLowerCase();
            if (input === "" || keywords.includes(input)) {
                btn.style.display = "";
                anyVisible = true;
            } else {
                btn.style.display = "none";
            }
        });
        const infoDiv = document.getElementById("info-content");
        if (!anyVisible && input !== "") {
            infoDiv.innerHTML = "該当する項目が見つかりませんでした。";
            infoDiv.style.display = "block";
            clearActiveButtons();
        } else if (input === "") {
            infoDiv.innerHTML = "";
            infoDiv.style.display = "none";
            clearActiveButtons();
        }
    }

    // クイズ結果をFirestoreに保存する関数を定義
    async function saveQuizScore(category, correct, total) {
        const user = firebase.auth().currentUser;
        if (!user) {
            console.error("ユーザーがログインしていません。");
            return;
        }

        const db = firebase.firestore();
        const quizScoreData = {
            userId: user.uid,
            category: category,
            correct: correct,
            total: total,
            accuracy: (correct / total) * 100,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection('movie_quiz_scores').add(quizScoreData);
            console.log("クイズ結果が正常に保存されました。");
        } catch (error) {
            console.error("クイズ結果の保存中にエラーが発生しました:", error);
        }
    }

    // クイズ回答チェック
    function checkQuizAnswer(selectedAnswer) {
        const quizKey = `about${currentVideoIndex + 1}`;
        const questions = quizQuestions[quizKey] || [];
        const currentQuestion = questions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quiz-content .quiz-choice-btn');
        buttons.forEach(btn => btn.disabled = true);
        buttons.forEach(btn => {
            if (btn.textContent === currentQuestion.answer) {
                btn.classList.add('correct');
            } else if (btn.textContent === selectedAnswer && selectedAnswer !== currentQuestion.answer) {
                btn.classList.add('incorrect');
            }
        });
        const resultDiv = document.createElement('div');
        if (selectedAnswer === currentQuestion.answer) {
            resultDiv.textContent = '正解です！';
            resultDiv.className = 'quiz-result correct';
            quizScore++;
        } else {
            resultDiv.textContent = `不正解です。正解は ${currentQuestion.answer} でした。`;
            resultDiv.className = 'quiz-result incorrect';
        }
        document.getElementById('quiz-content').appendChild(resultDiv);
        setTimeout(() => {
            currentQuizIndex++;
            showQuizQuestion();
        }, 2000);
    }
    function restartQuiz() {
        currentQuizIndex = 0;
        quizScore = 0;
        showQuizQuestion();
    }

        const quizKey = `test${currentVideoIndex + 1}`;

        const currentQuestion = questions[currentQuizIndex];

        buttons.forEach(btn => btn.disabled = true);
        buttons.forEach(btn => {

                btn.classList.add('correct');
            } else if (btn.textContent === selectedAnswer && selectedAnswer !== currentQuestion.answer) {
                btn.classList.add('incorrect');

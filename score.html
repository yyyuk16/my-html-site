<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ結果</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      /* 既存のスタイルを維持しつつ、緑の色調に変更 */
      :root {
          /* ピンクメインのカラーパレット */
          --color-pink-light: #FFE4E8;
          --color-pink: #FFB6C1;
          --color-pink-dark: #FF7080;
          --color-pink-accent: #FF4D6D;
          --color-pink-gradient: #FF8FA3;
          --primary-color: var(--color-pink);
          --secondary-color: var(--color-pink-dark);
          --accent-color: var(--color-pink-accent);
          --background-color: #FFF5F6;
          --text-color: #1A1A1A;
          --shadow-color: rgba(255, 112, 128, 0.15);
          --card-bg: rgba(255, 255, 255, 0.95);
          --todo-bg: var(--card-bg);
      }
  
      /* 既存のスタイル定義は維持 */
      body {
          background: linear-gradient(135deg, var(--color-pink-light), var(--color-pink));
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          margin: 0;
          padding: 20px;
      }
  
      .container {
          width: 100%;
          max-width: 1200px;
          background: var(--card-bg);
          border-radius: 20px;
          padding: 30px;
          box-shadow: 0 8px 24px var(--shadow-color);
      }
  
      .header {
          text-align: center;
          margin-bottom: 30px;
      }
  
      .header h1 {
          font-size: 2.5rem;
          color: var(--primary-color);
          margin: 0;
          padding: 20px 0;
      }
  
      /* 医師向けの追加スタイル */
      .patient-list {
          margin-top: 20px;
      }
  
      .patient-item {
          padding: 15px;
          border-left: 4px solid var(--primary-color);
          background: white;
          margin-bottom: 10px;
          border-radius: 4px;
          box-shadow: 0 2px 4px var(--shadow-color);
      }
  
      .patient-item h3 {
          margin: 0 0 5px 0;
          color: var(--text-color);
      }
  
      .patient-info {
          font-size: 14px;
          color: #666;
      }
  
      .status-badge {
          display: inline-block;
          padding: 4px 8px;
          border-radius: 12px;
          font-size: 12px;
          font-weight: 500;
          margin-left: 8px;
      }
  
      .status-urgent {
          background: #FFEBEE;
          color: #D32F2F;
      }
  
      .status-normal {
          background: #E8F5E9;
          color: #2E7D32;
      }
  
      .tab-header {
          display: flex;
          justify-content: center;
          gap: 12px;
          background-color: var(--primary-color);
          border-radius: 25px;
          padding: 6px;
          box-shadow: 0 4px 12px var(--shadow-color);
          margin-bottom: 30px;
      }
  
      .tab-button {
          padding: 12px 25px;
          background: transparent;
          border: none;
          border-radius: 20px;
          cursor: pointer;
          font-size: 18px;
          font-weight: 500;
          color: rgba(255, 255, 255, 0.8);
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          gap: 6px;
      }
  
      .tab-button.active {
          background: white;
          color: var(--primary-color);
          box-shadow: 0 2px 10px var(--shadow-color);
      }
  
      .main-content {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 30px;
          margin-top: 30px;
      }
  
      /* カレンダーのスタイル */
      .calendar {
          background: white;
          border-radius: 15px;
          padding: 25px;
          box-shadow: 0 4px 15px var(--shadow-color);
          max-width: 600px;
          margin: 0 auto;
      }
  
      .calendar-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 25px;
          padding: 0 10px;
      }
  
      .calendar-header h2 {
          font-size: 1.5rem;
          color: var(--primary-color);
          margin: 0;
      }
  
      .calendar-header button {
          background: var(--color-pink-light);
          color: var(--primary-color);
          border: none;
          padding: 10px 15px;
          border-radius: 8px;
          cursor: pointer;
          font-size: 1.1rem;
          transition: all 0.3s ease;
      }
  
      .calendar-header button:hover {
          background: var(--primary-color);
          color: white;
      }
  
      .calendar-weekdays {
          display: grid;
          grid-template-columns: repeat(7, 1fr);
          margin-bottom: 8px;
      }
  
      .calendar-weekday {
          text-align: center;
          font-weight: 600;
          padding: 10px 5px;
          color: var(--primary-color);
          font-size: 0.95rem;
          border-bottom: 2px solid var(--color-pink-light);
          background: #f5f9f5;
      }
  
      .calendar-grid {
          display: grid;
          grid-template-columns: repeat(7, 1fr);
          gap: 8px;
          padding: 0;
          min-height: 330px;
      }
  
      .calendar-day {
          aspect-ratio: 1;
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          justify-content: flex-start;
          text-align: left;
          padding: 5px;
          border-radius: 10px;
          cursor: pointer;
          font-size: 0.95rem;
          position: relative;
          transition: all 0.2s ease;
          border: 1px solid transparent;
          min-height: 60px;
          box-sizing: border-box;
      }
      .calendar-day > span {
          font-size: 0.95rem;
          font-weight: bold;
          margin-bottom: 2px;
          margin-left: 2px;
      }
      .calendar-event {
          width: 100%;
          background: var(--color-pink-light);
          color: var(--color-pink-accent);
          border-radius: 8px;
          font-size: 0.8rem;
          margin-top: 2px;
          padding: 2px 6px;
          word-break: break-all;
          display: block;
          text-align: left;
          font-weight: bold;
          box-sizing: border-box;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
      }
      .calendar-event-title {
          font-size: 0.8rem;
          font-weight: bold;
          margin-right: 4px;
      }
      .calendar-event[data-color="blue"] {
          background: #66BB6A;
          color: #fff;
      }
      .calendar-event[data-color="red"] {
          background: #4CAF50;
          color: #fff;
      }
      .calendar-event[data-color="green"] {
          background: #81C784;
          color: #fff;
      }
      .calendar-event[data-color="yellow"] {
          background: #A5D6A7;
          color: #2E7D32;
      }
      .calendar-event[data-color="purple"] {
          background: #388E3C;
          color: #fff;
      }
      .calendar-event[data-color="orange"] {
          background: #66BB6A;
          color: #fff;
      }
      .calendar-event .event-delete {
          margin-left: 10px;
          color: #888;
          font-size: 1rem;
          cursor: pointer;
      }
      .calendar-event .event-edit {
          margin-left: 2px;
          color: #888;
          font-size: 1rem;
          cursor: pointer;
      }
      .calendar-event .event-edit:hover {
          color: var(--color-pink-dark);
      }
      .event-detail-pop {
          position: absolute;
          z-index: 2000;
          background: #fff;
          border: 1px solid #ccc;
          border-radius: 8px;
          padding: 10px 15px;
          min-width: 200px;
          box-shadow: 0 4px 16px rgba(0,0,0,0.18);
          font-size: 0.95rem;
          color: #333;
          top: 30px;
          left: 0;
          display: none;
      }
      .event-detail-pop.active {
          display: block;
      }
  
      @media (max-width: 768px) {
          .main-content {
              grid-template-columns: 1fr;
          }
          
          .container {
              padding: 20px;
          }
      }
  
      /* モーダルのスタイル */
      .modal-bg {
          display: none;
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background: rgba(0,0,0,0.3);
          z-index: 1000;
          justify-content: center;
          align-items: center;
      }
      .modal-bg.active {
          display: flex;
      }
      .modal {
          background: #fff;
          border-radius: 10px;
          padding: 30px 20px 20px 20px;
          min-width: 300px;
          box-shadow: 0 4px 24px rgba(0,0,0,0.18);
          position: relative;
      }
      .modal-close {
          position: absolute;
          top: 10px;
          right: 15px;
          font-size: 1.3rem;
          color: #888;
          cursor: pointer;
      }
      .modal input, .modal textarea {
          width: 100%;
          margin-bottom: 12px;
          padding: 8px;
          border-radius: 5px;
          border: 1px solid #ccc;
          font-size: 1rem;
      }
      .modal button {
          background: var(--primary-color);
          color: #fff;
          border: none;
          padding: 8px 18px;
          border-radius: 5px;
          cursor: pointer;
          font-size: 1rem;
      }

      .score-card {
          background: white;
          border-radius: 15px;
          padding: 20px;
          margin-bottom: 15px;
          box-shadow: 0 4px 15px var(--shadow-color);
          transition: transform 0.2s ease;
      }

      .score-card:hover {
          transform: translateY(-2px);
      }

      .score-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 10px;
      }

      .timestamp {
          color: #666;
          font-size: 0.9rem;
      }

      .accuracy {
          font-weight: bold;
          color: var(--primary-color);
      }

      .rank-badge {
          display: inline-block;
          padding: 4px 12px;
          border-radius: 12px;
          font-weight: bold;
          color: white;
          font-size: 0.9rem;
          margin-left: 10px;
          box-shadow: 0 2px 6px var(--shadow-color);
      }

      .rank-s {
          background: linear-gradient(135deg, #FFD700, #FFA500);
      }

      .rank-a {
          background: linear-gradient(135deg, #FF4D6D, #FF8FA3);
      }

      .rank-b {
          background: linear-gradient(135deg, #4FC3F7, #81D4FA);
      }

      .rank-c {
          background: linear-gradient(135deg, #81C784, #A5D6A7);
      }

      .rank-d {
          background: linear-gradient(135deg, #E57373, #FFCDD2);
      }

      .score-details {
          color: #666;
          font-size: 0.95rem;
      }

      /* グラフと統計情報のスタイル */
      .stats-container {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 20px;
          margin-bottom: 30px;
      }

      .stats-card {
          background: white;
          border-radius: 15px;
          padding: 20px;
          box-shadow: 0 4px 15px var(--shadow-color);
      }

      .stats-card h2 {
          color: var(--primary-color);
          margin: 0 0 15px 0;
          font-size: 1.2rem;
      }

      .chart-container {
          position: relative;
          height: 300px;
          margin-bottom: 20px;
      }

      .best-score {
          border: 2px solid #FFD700;
          background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.2));
      }

      .category-tabs {
          display: flex;
          gap: 10px;
          margin-bottom: 20px;
          overflow-x: auto;
          padding-bottom: 10px;
      }

      .category-tab {
          padding: 8px 16px;
          background: var(--color-pink-light);
          border: none;
          border-radius: 20px;
          cursor: pointer;
          white-space: nowrap;
          transition: all 0.3s ease;
      }

      .category-tab.active {
          background: var(--primary-color);
          color: white;
      }

      .category-tab:hover {
          background: var(--color-pink);
          color: white;
      }

      .no-scores {
          text-align: center;
          padding: 40px;
          background: white;
          border-radius: 15px;
          box-shadow: 0 4px 15px var(--shadow-color);
      }

      .no-scores p {
          color: #666;
          margin-bottom: 20px;
      }

      .quiz-button {
          background: var(--primary-color);
          color: white;
          border: none;
          padding: 12px 24px;
          border-radius: 25px;
          cursor: pointer;
          font-size: 1rem;
          transition: all 0.3s ease;
          display: inline-block;
          text-decoration: none;
      }

      .quiz-button:hover {
          background: var(--color-pink-dark);
          transform: translateY(-2px);
      }
    </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>医療情報管理アプリ</h1>
    </div>
      
    <div class="tab-container">
        <div class="tab-header">
          <button class="tab-button" onclick="location.href='choise.html'">
            <span class="tab-icon">👤</span>
            <span class="tab-text">HOME</span>
          </button>
          <button class="tab-button" onclick="location.href='ai.html'">
            <span class="tab-icon">💬</span>
            <span class="tab-text">チャット</span>
          </button>
          <button class="tab-button active" onclick="location.href='score.html'">
            <span class="tab-icon">❓</span>
            <span class="tab-text">Q&A</span>
          </button>
          <button class="tab-button" onclick="location.href='movie.html'">
            <span class="tab-icon">🎬</span>
            <span class="tab-text">動画視聴</span>
          </button>
          <button class="tab-button" onclick="location.href='profile.html'">
            <span class="tab-icon">👤</span>
            <span class="tab-text">プロフィール</span>
          </button>
        </div>
    </div>
    <!-- クイズのスコア表示とランク表示の画面 -->

    <div class="stats-container">
        <div class="stats-card">
            <h2>クイズ成績推移</h2>
            <div class="chart-container">
                <canvas id="movieScoreChart"></canvas>
            </div>
        </div>
    </div>

    <div style="display: flex; justify-content: center; gap: 32px; margin: 30px 0;">
      <div class="stats-card" style="flex: 1; min-width: 320px;">
        <!-- クイズ成績推移グラフは既に上部にあるため、ここは空欄または他の要素を追加可能 -->
      </div>
      <div class="rank-container" style="margin: 0; flex: 0 0 400px;">
        <div class="rank-card" style="background: #f8f9fa; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); max-width: 400px;">
          <h3 style="margin-bottom: 10px;">あなたのランク</h3>
          <div id="userRankInfo" style="font-size: 1.1rem; color: #333;">
            <!-- ランク情報がここに表示されます -->
          </div>
        </div>
      </div>
    </div>

    <div id="scores-container"></div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
      // Firebaseの設定
      const firebaseConfig = {
          apiKey: "AIzaSyC31W-TEE7mIBGFwrRxJAuPugjnEFfWe_k",
          authDomain: "web01-2484d.firebaseapp.com",
          projectId: "web01-2484d",
          storageBucket: "web01-2484d.appspot.com",
          messagingSenderId: "90159472898",
          appId: "1:90159472898:web:261ec71f9919611011e21b"
      };
      firebase.initializeApp(firebaseConfig);

      let movieScoreChart = null;
      let allMovieScores = [];

      // クイズスコア取得
      async function loadMovieScores(userId) {
          try {
              const db = firebase.firestore();
              const doc = await db.collection('movie_quiz_scores').doc(userId).get();
              if (doc.exists) {
                  const data = doc.data();
                  if (data.scores && Array.isArray(data.scores)) {
                      const sortedScores = data.scores.sort((a, b) =>
                          b.timestamp.toDate() - a.timestamp.toDate()
                      );
                      allMovieScores = sortedScores;
                      updateMovieScoreChart(sortedScores);
                      renderMovieScores(sortedScores);
                  } else {
                      renderMovieScores([]);
                  }
              } else {
                  renderMovieScores([]);
              }
          } catch (error) {
              console.error("クイズスコアの読み込みに失敗しました:", error);
              renderMovieScores([]);
          }
      }

      // 全ユーザーのスコアからランク計算
      async function loadAllMovieScoresAndRank(currentUserId) {
          try {
              const db = firebase.firestore();
              const scoresRef = db.collection('movie_quiz_scores');
              const snapshot = await scoresRef.get();

              if (snapshot.empty) {
                  updateUserRankDisplay(null, 0, null);
                  return;
              }

              const allUserAverageScores = [];
              snapshot.forEach(doc => {
                  const data = doc.data();
                  if (data.scores && Array.isArray(data.scores) && data.scores.length > 0) {
                      const userId = doc.id;
                      const totalAccuracy = data.scores.reduce((sum, score) => sum + score.accuracy, 0);
                      const averageAccuracy = totalAccuracy / data.scores.length;
                      allUserAverageScores.push({
                          userId: userId,
                          average: averageAccuracy
                      });
                  }
              });

              allUserAverageScores.sort((a, b) => b.average - a.average);

              const userRank = allUserAverageScores.findIndex(user => user.userId === currentUserId) + 1;
              const totalUsers = allUserAverageScores.length;
              const userAverageScore = allUserAverageScores.find(user => user.userId === currentUserId)?.average;

              updateUserRankDisplay(userRank, totalUsers, userAverageScore);

          } catch (error) {
              console.error("全スコアの読み込みとランク計算に失敗しました:", error);
              updateUserRankDisplay(null, 0, null);
          }
      }

      // ランク表示
      function updateUserRankDisplay(rank, total, average) {
          const userRankInfo = document.getElementById('userRankInfo');
          if (userRankInfo) {
              if (average !== undefined && average !== null) {
                  const rankObj = getRank(average);
                  userRankInfo.innerHTML = `
                      <div style="font-size:1.3em; margin-bottom:8px;">
                        <span class="rank-badge ${rankObj.class}" style="font-size:1.2em; padding:4px 12px; border-radius:8px; background:#e3eaff; color:#2a4d8c; margin-right:8px;">${rankObj.label}ランク</span>
                        <span>（平均正答率: <b>${average.toFixed(1)}%</b>）</span>
                      </div>
                      <div>あなたの順位: <b>${rank}</b> / <b>${total}</b> 人中</div>
                  `;
              } else {
                  userRankInfo.innerHTML = `
                      <p>クイズに挑戦して、<b>ランクを上げていこう！</b></p>
                  `;
              }
          }
      }

      // 正答率からランクを取得
      function getRank(accuracy) {
          if (accuracy === null || accuracy === undefined) {
              return { label: 'N/A', class: 'rank-d' };
          }
          if (accuracy >= 90) return { label: 'S', class: 'rank-s' };
          if (accuracy >= 80) return { label: 'A', class: 'rank-a' };
          if (accuracy >= 60) return { label: 'B', class: 'rank-b' };
          if (accuracy >= 40) return { label: 'C', class: 'rank-c' };
          return { label: 'D', class: 'rank-d' };
      }

      // クイズ成績推移グラフ
      function updateMovieScoreChart(scores) {
          const ctx = document.getElementById('movieScoreChart').getContext('2d');
          if (movieScoreChart) {
              movieScoreChart.destroy();
          }
          if (!scores || scores.length === 0) {
              movieScoreChart = new Chart(ctx, {
                  type: 'line',
                  data: { labels: [], datasets: [{ label: '正答率', data: [] }] },
                  options: { responsive: true, maintainAspectRatio: false }
              });
              return;
          }

          const labels = scores.map(score =>
              score.timestamp.toDate().toLocaleDateString('ja-JP')
          ).reverse();
          const data = scores.map(score => score.accuracy).reverse();

          movieScoreChart = new Chart(ctx, {
              type: 'line',
              data: {
                  labels: labels,
                  datasets: [{
                      label: '正答率',
                      data: data,
                      borderColor: '#4D8CFF',
                      backgroundColor: 'rgba(77, 140, 255, 0.1)',
                      tension: 0.4,
                      fill: true
                  }]
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  scales: {
                      y: {
                          beginAtZero: true,
                          max: 100,
                          title: {
                              display: true,
                              text: '正答率 (%)'
                          }
                      }
                  }
              }
          });
      }

      // クイズスコアカード描画
      function renderMovieScores(scores) {
          const scoresContainer = document.getElementById('scores-container');
          if (!scores || scores.length === 0) {
              scoresContainer.innerHTML = '<p>クイズの結果はありません。</p>';
              return;
          }
          scoresContainer.innerHTML = '';
          const bestScore = scores.reduce((best, current) =>
              current.accuracy > best.accuracy ? current : best
          );
          scores.forEach(score => {
              const scoreCard = document.createElement('div');
              scoreCard.className = 'score-card';
              let dateObj;
              if (score.timestamp && typeof score.timestamp.toDate === 'function') {
                  dateObj = score.timestamp.toDate();
              } else {
                  dateObj = new Date(score.timestamp);
              }
              const formattedDate = dateObj.toLocaleString('ja-JP');
              const rank = getRank(score.accuracy);
              if (score === bestScore) {
                  scoreCard.classList.add('best-score');
              }
              scoreCard.innerHTML = `
                  <div class="score-header">
                      <span class="timestamp">${formattedDate}</span>
                      <div>
                          <span class="accuracy">正答率: ${score.accuracy?.toFixed(1) ?? '-'}%</span>
                          <span class="rank-badge ${rank.class}">${rank.label}ランク</span>
                      </div>
                  </div>
                  <div class="score-details">
                      <p>正解数: ${score.correct ?? '-'} / ${score.total ?? '-'}</p>
                      <p>クイズ種別: 動画クイズ</p>
                  </div>
              `;
              scoresContainer.appendChild(scoreCard);
          });
      }

      // ページ読み込み時
      firebase.auth().onAuthStateChanged(user => {
          if (user) {
              loadMovieScores(user.uid);
              loadAllMovieScoresAndRank(user.uid);
          } else {
              window.location.href = 'login.html';
          }
      });
  </script>
</body>
</html>
